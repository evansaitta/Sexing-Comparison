<script type="text/plain" id="app-source">

const { useState, useCallback, useRef, useEffect } = React;
const {
  LineChart, Line, ComposedChart, ScatterChart, Scatter, Area,
  XAxis, YAxis, ZAxis, CartesianGrid, Tooltip, Legend,
  ResponsiveContainer, ReferenceLine, ReferenceArea, Cell
} = Recharts;

// ============================================================================
//  Sexing Method Comparison Simulator
//  Companion to the Saitta et al. 2020 method-evaluation simulator.
//  Question: when you split a monomorphic von Bertalanffy fit's residuals into
//  two sexes, does the crude RESIDUAL-SIGN rule (Saitta) or a 2-component
//  GAUSSIAN MIXTURE (GMM) recover sex more accurately -- and which gives a less
//  biased estimate of the true size difference between sexes?
// ============================================================================

// ---- Tick / formatting helpers (shared with the main simulator) ------------
function niceTicks(lo, hi, targetCount = 5) {
  if (!isFinite(lo) || !isFinite(hi) || lo === hi) return [lo];
  const anchoredLo = lo >= 0 ? 0 : lo;
  const anchoredHi = hi <= 0 ? 0 : hi;
  const range = anchoredHi - anchoredLo;
  const roughStep = range / (targetCount - 1);
  const mag = Math.pow(10, Math.floor(Math.log10(Math.abs(roughStep) || 1)));
  const normalized = roughStep / mag;
  const niceStep = normalized <= 1 ? 1 * mag
                 : normalized <= 2 ? 2 * mag
                 : normalized <= 2.5 ? 2.5 * mag
                 : normalized <= 5 ? 5 * mag
                 : 10 * mag;
  const start = Math.ceil(anchoredLo / niceStep) * niceStep;
  const end = Math.floor(anchoredHi / niceStep) * niceStep;
  const ticks = [];
  for (let t = start; t <= end + niceStep * 0.001; t += niceStep) ticks.push(+t.toPrecision(10));
  return ticks.length >= 2 ? ticks : [anchoredLo, anchoredHi];
}

// ---- VB fitting via Gauss-Newton NLS (verbatim from the main simulator) -----
function vbPredict(params, age) {
  const { Linf, K, t0 } = params;
  return Linf * (1 - Math.exp(-K * (age - t0)));
}
function solve3x3(A, b) {
  const d = A[0][0]*(A[1][1]*A[2][2]-A[1][2]*A[2][1])
          - A[0][1]*(A[1][0]*A[2][2]-A[1][2]*A[2][0])
          + A[0][2]*(A[1][0]*A[2][1]-A[1][1]*A[2][0]);
  if (Math.abs(d) < 1e-14) return null;
  const inv = [[0,0,0],[0,0,0],[0,0,0]];
  inv[0][0]=(A[1][1]*A[2][2]-A[1][2]*A[2][1])/d;
  inv[0][1]=(A[0][2]*A[2][1]-A[0][1]*A[2][2])/d;
  inv[0][2]=(A[0][1]*A[1][2]-A[0][2]*A[1][1])/d;
  inv[1][0]=(A[1][2]*A[2][0]-A[1][0]*A[2][2])/d;
  inv[1][1]=(A[0][0]*A[2][2]-A[0][2]*A[2][0])/d;
  inv[1][2]=(A[0][2]*A[1][0]-A[0][0]*A[1][2])/d;
  inv[2][0]=(A[1][0]*A[2][1]-A[1][1]*A[2][0])/d;
  inv[2][1]=(A[0][1]*A[2][0]-A[0][0]*A[2][1])/d;
  inv[2][2]=(A[0][0]*A[1][1]-A[0][1]*A[1][0])/d;
  return [inv[0][0]*b[0]+inv[0][1]*b[1]+inv[0][2]*b[2],
          inv[1][0]*b[0]+inv[1][1]*b[1]+inv[1][2]*b[2],
          inv[2][0]*b[0]+inv[2][1]*b[1]+inv[2][2]*b[2]];
}
function fitVB(ages, lengths, maxIter = 200, tol = 1e-8) {
  let Linf = Math.max(...lengths) * 1.1, K = 0.1, t0 = 0;
  const n = ages.length;
  for (let iter = 0; iter < maxIter; iter++) {
    const resids = ages.map((a, i) => lengths[i] - vbPredict({ Linf, K, t0 }, a));
    const J = ages.map((a) => {
      const e = Math.exp(-K * (a - t0));
      return [1 - e, Linf * (a - t0) * e, -Linf * K * e];
    });
    const JtJ = [[0,0,0],[0,0,0],[0,0,0]];
    const Jtr = [0, 0, 0];
    for (let i = 0; i < n; i++) {
      for (let r = 0; r < 3; r++) {
        Jtr[r] += J[i][r] * resids[i];
        for (let c = 0; c < 3; c++) JtJ[r][c] += J[i][r] * J[i][c];
      }
    }
    const delta = solve3x3(JtJ, Jtr);
    if (!delta) break;
    Linf += delta[0]; K += delta[1]; t0 += delta[2];
    if (Math.abs(delta[0]) + Math.abs(delta[1]) + Math.abs(delta[2]) < tol) break;
  }
  if (!isFinite(Linf) || !isFinite(K) || !isFinite(t0) || K <= 0 || Linf <= 0) return null;
  return { Linf, K, t0 };
}

// ---- RNG -------------------------------------------------------------------
let _spare = null;
function randn(mean, sd) {
  if (_spare !== null) { const v = _spare; _spare = null; return mean + sd * v; }
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  const m = Math.sqrt(-2 * Math.log(u));
  _spare = m * Math.sin(2 * Math.PI * v);
  return mean + sd * m * Math.cos(2 * Math.PI * v);
}
function runif(min, max) { return min + Math.random() * (max - min); }

// ---- Alligator model (Saitta) ----------------------------------------------
function alligSD(L, sdMult = 1) { return sdMult * (0.0589 * Math.log(Math.max(L, 0.01)) + 0.0816); }
function maleVB(age, E) { return (2.78 + E) * (1 - (0.91 + 0.02970297 * E) * Math.exp((-0.0926 + 0.022871287 * E) * age)); }
function femaleVB(age) { return 2.78 * (1 - 0.91 * Math.exp(-0.0926 * age)); }

// ---- GMM: 2-component Gaussian mixture via EM, returning posteriors ---------
// Returns the per-point posterior G2[i] = P(point i belongs to the UPPER-mean
// component | data). A point is assigned to the larger ("male") group when
// G2 > 0.5. This is the hard assignment used for the accuracy comparison.
function fitGMM(residuals, maxIter = 100, tol = 1e-6) {
  const n = residuals.length;
  if (n < 10) return null;
  const sorted = [...residuals].sort((a, b) => a - b);
  const half = Math.floor(n / 2);
  let mu1 = sorted.slice(0, half).reduce((s, x) => s + x, 0) / half;
  let mu2 = sorted.slice(half).reduce((s, x) => s + x, 0) / (n - half);
  const om = residuals.reduce((s, x) => s + x, 0) / n;
  const ov = residuals.reduce((s, x) => s + (x - om) ** 2, 0) / n;
  const initSD = Math.sqrt(ov / 2) || 0.01;
  let pi = 0.5, s1 = initSD, s2 = initSD, prevLL = -Infinity;
  const gauss = (x, mu, sig) => sig <= 0 ? 0 : Math.exp(-0.5 * ((x - mu) / sig) ** 2) / (sig * Math.sqrt(2 * Math.PI));
  for (let iter = 0; iter < maxIter; iter++) {
    const r1 = residuals.map(x => pi * gauss(x, mu1, s1));
    const r2 = residuals.map(x => (1 - pi) * gauss(x, mu2, s2));
    const rt = r1.map((v, i) => v + r2[i] + 1e-300);
    const g1 = r1.map((v, i) => v / rt[i]), g2 = r2.map((v, i) => v / rt[i]);
    const ll = rt.reduce((s, v) => s + Math.log(v), 0);
    if (!isFinite(ll)) return null;
    const n1 = g1.reduce((s, v) => s + v, 0), n2 = g2.reduce((s, v) => s + v, 0);
    if (n1 < 1 || n2 < 1) return null;
    pi = n1 / n;
    mu1 = g1.reduce((s, v, i) => s + v * residuals[i], 0) / n1;
    mu2 = g2.reduce((s, v, i) => s + v * residuals[i], 0) / n2;
    s1 = Math.sqrt(g1.reduce((s, v, i) => s + v * (residuals[i] - mu1) ** 2, 0) / n1) || 0.001;
    s2 = Math.sqrt(g2.reduce((s, v, i) => s + v * (residuals[i] - mu2) ** 2, 0) / n2) || 0.001;
    if (Math.abs(ll - prevLL) < tol) break;
    prevLL = ll;
  }
  // Order so component 2 is the UPPER-mean (larger / "male") component.
  if (mu1 > mu2) { [mu1, mu2] = [mu2, mu1]; [s1, s2] = [s2, s1]; pi = 1 - pi; }
  // Recompute posteriors with the final ordered parameters.
  const r1 = residuals.map(x => pi * gauss(x, mu1, s1));
  const r2 = residuals.map(x => (1 - pi) * gauss(x, mu2, s2));
  const G2 = r1.map((v, i) => r2[i] / (v + r2[i] + 1e-300));
  const pooledSD = Math.sqrt((s1 * s1 + s2 * s2) / 2);
  const sep = pooledSD > 0 ? (mu2 - mu1) / pooledSD : 0;
  return { mu1, mu2, s1, s2, pi, G2, sep };
}

// Analytic posterior-0.5 boundary points for two Gaussians (for the inspector).
function gmmBoundaries(g) {
  const { mu1, mu2, s1, s2, pi } = g;
  // Solve pi*N(x|mu1,s1) = (1-pi)*N(x|mu2,s2)  ->  A x^2 + B x + C = 0.
  const A = 1 / (2 * s1 * s1) - 1 / (2 * s2 * s2);
  const B = mu2 / (s2 * s2) - mu1 / (s1 * s1);
  const C = mu1 * mu1 / (2 * s1 * s1) - mu2 * mu2 / (2 * s2 * s2)
          - Math.log((pi / s1) / ((1 - pi) / s2));
  const roots = [];
  if (Math.abs(A) < 1e-12) {
    if (Math.abs(B) > 1e-12) roots.push(-C / B);
  } else {
    const disc = B * B - 4 * A * C;
    if (disc >= 0) {
      const sq = Math.sqrt(disc);
      roots.push((-B + sq) / (2 * A), (-B - sq) / (2 * A));
    }
  }
  // Keep only boundaries that fall between the two means (the meaningful split).
  return roots.filter(x => x > Math.min(mu1, mu2) - 3 && x < Math.max(mu1, mu2) + 3)
              .sort((a, b) => a - b);
}

// ---- Constants -------------------------------------------------------------
const NATURAL_E = 1.01;        // natural alligator dimorphism (Linf difference, m)
const NATURAL_SD_MULT = 1.0;   // natural residual scatter
const N_STEPS = 20;
// L-infinity guard: reject biologically implausible VB refits so a handful of
// degenerate fits (mostly from the GMM at extreme dimorphism) don't dominate
// the average effect estimate. Alligator Linf lives near 2.8-5.3 m.
const LINF_MIN = 0.5, LINF_MAX = 10;
// Sexual maturity: independent sexing (reproductive traces, most morphological or
// genetic methods) is only possible once an animal is mature. American alligators
// mature at ~1.8 m total length, which in this growth model is ~age 10, so we let
// only specimens at or beyond this age be candidates for direct (anchor) sexing.
const MATURE_AGE = 10;

// ============================================================================
//  Simulation engine
// ============================================================================

// Guarded effect estimate: refit VB to each assigned group, return |Linf_large
// - Linf_small|, or null if either group is too small or a fit is implausible.
function guardedEffect(largeAges, largeLens, smallAges, smallLens) {
  if (largeAges.length < 5 || smallAges.length < 5) return { eff: null, rejected: true };
  const lFit = fitVB(largeAges, largeLens);
  const sFit = fitVB(smallAges, smallLens);
  if (!lFit || !sFit) return { eff: null, rejected: true };
  const bad = v => v > LINF_MAX || v < LINF_MIN;
  if (bad(lFit.Linf) || bad(sFit.Linf)) return { eff: null, rejected: true };
  return { eff: Math.abs(lFit.Linf - sFit.Linf), rejected: false };
}

// ---- Method C: seeded classification-EM (a two-curve mixture) --------------
// Initialise with Saitta's residual-sign split, then alternate hard-EM steps:
// fit a VB curve to each tentative group, reassign every animal to the curve it
// is more likely to belong to under the age-dependent noise model, refit, and
// repeat until the labels stop changing. This is the principled version of what
// the GMM attempts -- but it keeps the AGE axis (each animal is compared to the
// two curves AT ITS OWN AGE) instead of collapsing to 1-D residual magnitudes,
// and the Saitta seed steers it away from the bad local optima that make a
// cold-start mixture fragile.
function fitCEM(ages, lens, sdMult, initAssignMale, maxIter = 30) {
  let assign = initAssignMale.slice();
  let lFit = null, sFit = null;
  for (let iter = 0; iter < maxIter; iter++) {
    const lA = [], lL = [], sA = [], sL = [];
    for (let i = 0; i < ages.length; i++) {
      if (assign[i]) { lA.push(ages[i]); lL.push(lens[i]); }
      else { sA.push(ages[i]); sL.push(lens[i]); }
    }
    if (lA.length < 5 || sA.length < 5) return null;
    const f1 = fitVB(lA, lL), f2 = fitVB(sA, sL);
    if (!f1 || !f2) return null;
    lFit = f1; sFit = f2;
    // Hard E-step: assign each animal to the higher-likelihood curve (equal
    // priors; Gaussian likelihood using the age-dependent SD at each curve).
    let changed = false;
    const next = new Array(ages.length);
    for (let i = 0; i < ages.length; i++) {
      const mPred = vbPredict(lFit, ages[i]), fPred = vbPredict(sFit, ages[i]);
      const mSD = Math.max(alligSD(mPred, sdMult), 1e-3);
      const fSD = Math.max(alligSD(fPred, sdMult), 1e-3);
      const llM = -Math.log(mSD) - 0.5 * ((lens[i] - mPred) / mSD) ** 2;
      const llF = -Math.log(fSD) - 0.5 * ((lens[i] - fPred) / fSD) ** 2;
      const m = llM >= llF;
      next[i] = m;
      if (m !== assign[i]) changed = true;
    }
    assign = next;
    if (!changed) break;
  }
  if (!lFit || !sFit) return null;
  // Keep the "male" label on the larger-asymptote curve, matching the scoring
  // convention (male == larger group, since true males have the bigger L-inf).
  if (lFit.Linf < sFit.Linf) { assign = assign.map(m => !m); const t = lFit; lFit = sFit; sFit = t; }
  return { assignMale: assign, lFit, sFit };
}

// Same algorithm as fitCEM, but records the full trajectory for visualization:
// one frame per iteration, each holding the assignment used to fit, the two
// fitted curves, how many points the E-step then moved, and whether converged.
function fitCEMTrace(ages, lens, sdMult, initAssignMale, maxIter = 30) {
  let assign = initAssignMale.slice();
  const frames = [];
  for (let iter = 0; iter < maxIter; iter++) {
    const lA = [], lL = [], sA = [], sL = [];
    for (let i = 0; i < ages.length; i++) { if (assign[i]) { lA.push(ages[i]); lL.push(lens[i]); } else { sA.push(ages[i]); sL.push(lens[i]); } }
    if (lA.length < 5 || sA.length < 5) { frames.push({ assign: assign.slice(), lFit: null, sFit: null, changed: 0, converged: true, collapsed: true }); break; }
    const lFit = fitVB(lA, lL), sFit = fitVB(sA, sL);
    if (!lFit || !sFit) { frames.push({ assign: assign.slice(), lFit: null, sFit: null, changed: 0, converged: true, collapsed: true }); break; }
    const next = new Array(ages.length); let changed = 0;
    for (let i = 0; i < ages.length; i++) {
      const mPred = vbPredict(lFit, ages[i]), fPred = vbPredict(sFit, ages[i]);
      const mSD = Math.max(alligSD(mPred, sdMult), 1e-3), fSD = Math.max(alligSD(fPred, sdMult), 1e-3);
      const llM = -Math.log(mSD) - 0.5 * ((lens[i] - mPred) / mSD) ** 2;
      const llF = -Math.log(fSD) - 0.5 * ((lens[i] - fPred) / fSD) ** 2;
      const m = llM >= llF; next[i] = m; if (m !== assign[i]) changed++;
    }
    frames.push({ assign: assign.slice(), lFit, sFit, changed, converged: changed === 0 });
    assign = next;
    if (changed === 0) break;
  }
  return frames;
}

// ===========================================================================
// BEYOND THE MONOMORPHIC FIT — two ways to add information the residual rule
// cannot use. (E) A semi-supervised EM that anchors on specimens whose sex is
// known independently (e.g. medullary-bone-like resorption signals in osteoderms,
// or eggs preserved in situ). (F) A bivariate classifier that adds a second
// sexually dimorphic trait (e.g. head/snout breadth) alongside body size.
// ===========================================================================

// Semi-supervised classification-EM: identical to fitCEM, except specimens whose
// sex is known are pinned to their true label and never reassigned. Those anchors
// pull the two curves toward the real sex-specific curves, improving the unknowns.
function fitSemiCEM(ages, lens, sdMult, initAssignMale, knownMask, knownMale, maxIter = 30) {
  let assign = initAssignMale.slice();
  let knownCount = 0;
  for (let i = 0; i < assign.length; i++) if (knownMask[i]) { assign[i] = knownMale[i]; knownCount++; }
  let lFit = null, sFit = null;
  for (let iter = 0; iter < maxIter; iter++) {
    const lA = [], lL = [], sA = [], sL = [];
    for (let i = 0; i < ages.length; i++) { if (assign[i]) { lA.push(ages[i]); lL.push(lens[i]); } else { sA.push(ages[i]); sL.push(lens[i]); } }
    if (lA.length < 5 || sA.length < 5) return null;
    const f1 = fitVB(lA, lL), f2 = fitVB(sA, sL); if (!f1 || !f2) return null; lFit = f1; sFit = f2;
    let changed = false; const next = new Array(ages.length);
    for (let i = 0; i < ages.length; i++) {
      if (knownMask[i]) { next[i] = knownMale[i]; continue; }
      const mPred = vbPredict(lFit, ages[i]), fPred = vbPredict(sFit, ages[i]);
      const mSD = Math.max(alligSD(mPred, sdMult), 1e-3), fSD = Math.max(alligSD(fPred, sdMult), 1e-3);
      const llM = -Math.log(mSD) - 0.5 * ((lens[i] - mPred) / mSD) ** 2;
      const llF = -Math.log(fSD) - 0.5 * ((lens[i] - fPred) / fSD) ** 2;
      const m = llM >= llF; next[i] = m; if (m !== assign[i]) changed = true;
    }
    assign = next; if (!changed) break;
  }
  if (!lFit || !sFit) return null;
  // With no anchors, orientation is arbitrary -> label larger-Linf curve "male"
  // (as fitCEM does). With anchors, the known labels already fix orientation.
  if (knownCount === 0 && lFit.Linf < sFit.Linf) { assign = assign.map(m => !m); const t = lFit; lFit = sFit; sFit = t; }
  return { assignMale: assign, lFit, sFit };
}

// Accuracy of an assignment against truth, optionally restricted to a subset mask.
function accuracyOn(assignMale, trueMale, mask) {
  let c = 0, n = 0;
  for (let i = 0; i < trueMale.length; i++) { if (mask && !mask[i]) continue; n++; if (assignMale[i] === trueMale[i]) c++; }
  return n ? c / n * 100 : NaN;
}

// Biologically motivated second trait: HEAD (skull) WIDTH, which in alligators
// scales tightly with body length (allometry). We model head width as
//   HW = HEAD_RATIO * L * (1 + delta * isMale) * (1 + HEAD_CV * noise),
// i.e. females have head width ~ HEAD_RATIO of body length, males are "delta"
// fraction broader-headed FOR THE SAME body length (a size-INDEPENDENT shape
// dimorphism), with individual scatter HEAD_CV. The sexing-relevant feature is the
// proportion HW/L ("relative head breadth"), which removes the size dependence:
// its sexes differ only by delta, so at delta = 0 head width is a pure size proxy
// (perfectly redundant) and adds nothing beyond body size.
const HEAD_RATIO = 0.09;   // female head width as a fraction of body length
const HEAD_CV = 0.06;      // individual variation in relative head breadth
function pearson(a, b) {
  const n = a.length; let sa = 0, sb = 0; for (let i = 0; i < n; i++) { sa += a[i]; sb += b[i]; }
  const ma = sa / n, mb = sb / n; let cov = 0, va = 0, vb = 0;
  for (let i = 0; i < n; i++) { const da = a[i] - ma, db = b[i] - mb; cov += da * db; va += da * da; vb += db * db; }
  return va > 0 && vb > 0 ? cov / Math.sqrt(va * vb) : NaN;
}
function simBivar(nPerSex, E, sdMult, delta) {
  const ages = [], lens = [], headW = [], trueMale = [];
  for (let i = 0; i < nPerSex; i++) { const a = runif(1, 50), L = randn(femaleVB(a), alligSD(femaleVB(a), sdMult)); const r = HEAD_RATIO * (1 + HEAD_CV * randn(0, 1)); ages.push(a); lens.push(L); headW.push(r * L); trueMale.push(false); }
  for (let i = 0; i < nPerSex; i++) { const a = runif(1, 50), L = randn(maleVB(a, E), alligSD(maleVB(a, E), sdMult)); const r = HEAD_RATIO * (1 + delta) * (1 + HEAD_CV * randn(0, 1)); ages.push(a); lens.push(L); headW.push(r * L); trueMale.push(true); }
  const fit = fitVB(ages, lens); if (!fit) return null;

// residual rule with no anchors. The gap between (i) and (ii) is the whole point.

  return fractions.map(fr => {
    let ov = 0, un = 0, re = 0, ns = 0;
    for (let r = 0; r < nReps; r++) {

      // (age >= MATURE_AGE), and either females only (reproductive traces) or any

// between raw head width and body length (intrinsically high — that is the point).

  return deltas.map(delta => {

    for (let r = 0; r < nReps; r++) {

      const ratio = s.headW.map((h, i) => h / s.lens[i]);

  const bic2 = -2 * two.ll + two.k * Math.log(n);
  const effAbs = Math.abs(two.fM.Linf - two.fF.Linf);
  return { dBIC: bic1 - bic2, detected: bic2 < bic1, one, two, effAbs, effPct: two.fF.Linf ? effAbs / two.fF.Linf * 100 : NaN };
}
function bootNullBatch(ages, fit, sig, reps, obsDBIC, mk) {
  const model = GROWTH[mk]; let det = 0, tot = 0, ge = 0;
  for (let b = 0; b < reps; b++) {
    const lens = ages.map(a => randn(model.predict(fit, a), sig));
    const res = detectG(ages, lens, mk);
    if (res) { tot++; if (res.detected) det++; if (res.dBIC >= obsDBIC) ge++; }
  }
  return { det, tot, ge };
}
function bootPowerBatch(ages, fit, sig, pct, reps, mk) {
  const model = GROWTH[mk]; let det = 0, tot = 0;
  for (let b = 0; b < reps; b++) {
    const lens = ages.map(a => { const f2 = { Linf: Math.random() < 0.5 ? fit.Linf * (1 + pct / 100) : fit.Linf, K: fit.K, t0: fit.t0 }; return randn(model.predict(f2, a), sig); });
    const res = detectG(ages, lens, mk);
    if (res) { tot++; if (res.detected) det++; }
  }
  return { det, tot };
}

// Generate one dataset and run ALL THREE sexing methods on the SAME data, so the
// comparison is perfectly fair. Returns rich per-point detail (used by both the
// sweep aggregation and the single-run inspector).
function simBoth(nPerSex, effectSize, sdMult) {
  const ages = [], lens = [], trueMale = [];
  for (let i = 0; i < nPerSex; i++) {
    const a = runif(1, 50), L = femaleVB(a);
    ages.push(a); lens.push(randn(L, alligSD(L, sdMult))); trueMale.push(false);
  }
  for (let i = 0; i < nPerSex; i++) {
    const a = runif(1, 50), L = maleVB(a, effectSize);
    ages.push(a); lens.push(randn(L, alligSD(L, sdMult))); trueMale.push(true);
  }
  const fit = fitVB(ages, lens);
  if (!fit) return null;
  const resid = ages.map((a, i) => lens[i] - vbPredict(fit, a));

  // ---- Method A: residual sign (Saitta). r>0 -> larger ("male") group. ----
  const aAssignMale = resid.map(r => r > 0);
  // ---- Method B: GMM posterior. G2>0.5 -> upper-mean ("male") component. ---
  const gmm = fitGMM(resid);
  if (!gmm) return null;
  const bAssignMale = gmm.G2.map(g => g > 0.5);
  // ---- Method C: seeded classification-EM (two age-aware VB curves). -------
  const cem = fitCEM(ages, lens, sdMult, aAssignMale);
  const cAssignMale = cem ? cem.assignMale : null;

  // Per-sex accuracy, scored exactly as Saitta (fraction of each true sex put
  // in the matching group). "male" group == larger group by construction (E>0).
  const score = (assignMale) => {
    let mc = 0, fc = 0;
    for (let i = 0; i < trueMale.length; i++) {
      if (trueMale[i] && assignMale[i]) mc++;
      if (!trueMale[i] && !assignMale[i]) fc++;
    }
    return { maleAcc: mc / nPerSex * 100, femAcc: fc / nPerSex * 100, overall: (mc + fc) / (2 * nPerSex) * 100 };
  };
  const aScore = score(aAssignMale);
  const bScore = score(bAssignMale);
  const cScore = cAssignMale ? score(cAssignMale) : null;

  // Effect estimates from each method's groups.
  const split = (assignMale) => {
    const lA = [], lL = [], sA = [], sL = [];
    assignMale.forEach((m, i) => { if (m) { lA.push(ages[i]); lL.push(lens[i]); } else { sA.push(ages[i]); sL.push(lens[i]); } });
    return guardedEffect(lA, lL, sA, sL);
  };
  const aEff = split(aAssignMale);
  const bEff = split(bAssignMale);
  const cEff = cAssignMale ? split(cAssignMale) : { eff: null, rejected: true };

  return {
    ages, lens, trueMale, resid, fit, gmm,
    aAssignMale, bAssignMale, cAssignMale,
    aScore, bScore, cScore,
    aEff: aEff.eff, aRej: aEff.rejected,
    bEff: bEff.eff, bRej: bEff.rejected,
    cEff: cEff.eff, cRej: cEff.rejected,
    trueEffect: effectSize,
  };
}

// Aggregate many reps at each step of a sweep.
// scenario: "dimorphism" (E varies, SD fixed) or "noise" (SD varies, E fixed).
function runCompareSweep(scenario, steps, nPerSex, nReps) {
  const results = [];
  for (const step of steps) {
    const E = scenario === "dimorphism" ? step : NATURAL_E;
    const sd = scenario === "noise" ? step : NATURAL_SD_MULT;
    const rA = [], rB = [], rCc = [], eA = [], eB = [], eC = [], rAm = [], rAf = [], rBm = [], rBf = [], rCm = [], rCf = [];
    let bTot = 0, bRej = 0, aTot = 0, aRej = 0, cTot = 0, cRej = 0;
    for (let r = 0; r < nReps; r++) {
      const res = simBoth(nPerSex, E, sd);
      if (!res) continue;
      rA.push(res.aScore.overall); rB.push(res.bScore.overall);
      rAm.push(res.aScore.maleAcc); rAf.push(res.aScore.femAcc);
      rBm.push(res.bScore.maleAcc); rBf.push(res.bScore.femAcc);
      aTot++; if (res.aRej) aRej++; else eA.push(res.aEff);
      bTot++; if (res.bRej) bRej++; else eB.push(res.bEff);
      if (res.cScore) {
        rCc.push(res.cScore.overall); rCm.push(res.cScore.maleAcc); rCf.push(res.cScore.femAcc);
        cTot++; if (res.cRej) cRej++; else eC.push(res.cEff);
      }
    }
    if (rA.length === 0) { results.push(null); continue; }
    const mean = a => a.reduce((s, x) => s + x, 0) / a.length;
    const sdf = a => { const m = mean(a); return Math.sqrt(a.reduce((s, x) => s + (x - m) ** 2, 0) / a.length); };
    results.push({
      x: step, trueEffect: E,
      residAcc: mean(rA), residAccSd: sdf(rA),
      gmmAcc: mean(rB), gmmAccSd: sdf(rB),
      cemAcc: rCc.length ? mean(rCc) : NaN, cemAccSd: rCc.length ? sdf(rCc) : NaN,
      residMaleAcc: mean(rAm), residFemAcc: mean(rAf),
      gmmMaleAcc: mean(rBm), gmmFemAcc: mean(rBf),
      cemMaleAcc: rCm.length ? mean(rCm) : NaN, cemFemAcc: rCf.length ? mean(rCf) : NaN,
      residEff: eA.length ? mean(eA) : NaN,
      gmmEff: eB.length ? mean(eB) : NaN,
      cemEff: eC.length ? mean(eC) : NaN,
      residRejPct: aTot ? aRej / aTot * 100 : 0,
      gmmRejPct: bTot ? bRej / bTot * 100 : 0,
      cemRejPct: cTot ? cRej / cTot * 100 : 0,
      n: rA.length,
    });
  }
  return results;
}

// ============================================================================
//  Reusable comparison line chart (accuracy or effect, one sweep)
// ============================================================================
function CompareChart({ title, subtitle, data, xLabel, yLabel, series, refLines = [], yDomain, yTicks }) {
  const has = data && data.some(d => series.some(s => isFinite(d[s.key])));
  return (
    <div style={{ background: C.panel, border: `1px solid ${C.line}`, padding: "16px" }}>
      <div style={{ fontSize: "13px", fontWeight: "bold", color: C.navy }}>{title}</div>
      <div style={{ fontSize: "10px", color: "#8a7a5a", fontStyle: "italic", marginBottom: "8px" }}>{subtitle}</div>
      {has ? (
        <ResponsiveContainer width="100%" height={250}>
          <LineChart data={data} margin={{ top: 14, right: 18, left: 8, bottom: 34 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#ede8dd" />
            <XAxis dataKey="x" type="number" domain={["auto", "auto"]}
              label={{ value: xLabel, position: "bottom", offset: -4, style: { fontSize: 10, fill: C.label } }}
              tick={{ fontSize: 9 }} />
            <YAxis domain={yDomain || ["auto", "auto"]} ticks={yTicks}
              label={{ value: yLabel, angle: -90, position: "insideLeft", style: { fontSize: 10, fill: C.label, textAnchor: "middle" } }}
              tick={{ fontSize: 9 }} width={56} />
            <Tooltip
              formatter={(v, n) => [isFinite(v) ? (+v).toFixed(2) : "--", n]}
              labelFormatter={l => `${xLabel.split("(")[0].trim()}: ${(+l).toFixed(2)}`}
              contentStyle={{ fontFamily: "Georgia,serif", fontSize: "10px", border: `1px solid ${C.line}` }} />
            {refLines.map((r, i) => (
              <ReferenceLine key={i} y={r.y} stroke={r.color} strokeDasharray={r.dash || "4 4"} strokeWidth={1.2}
                label={{ value: r.label, position: r.pos || "insideTopRight", fill: r.color, fontSize: 9, fontWeight: "bold",
                  stroke: C.cream, strokeWidth: 3, paintOrder: "stroke" }} />
            ))}
            {series.map(s => (
              <Line key={s.key} type="monotone" dataKey={s.key} name={s.name}
                stroke={s.color} strokeWidth={s.width || 2.4} strokeDasharray={s.dash}
                dot={{ r: 2.5, fill: s.color }} activeDot={{ r: 5 }} connectNulls />
            ))}
            <Legend verticalAlign="top" height={24} iconType="plainline" wrapperStyle={{ fontSize: "11px" }} />
          </LineChart>

        <div style={{ height: 250, display: "flex", alignItems: "center", justifyContent: "center", color: "#aaa", fontStyle: "italic", fontSize: 11 }}>No data</div>
      )}
    </div>
  );
}

}

          <b style={{ color: "#d9c9a8" }}>Gaussian mixture</b> to the residuals. Method&nbsp;C, seeded by Saitta's split, iterates a{" "}
          <b style={{ color: "#d9c9a8" }}>two-curve classification-EM</b> that keeps the age axis. We score all three against the known

// ============================================================================
//  Accuracy panel (the headline result)
// ============================================================================
function AccuracyPanel({ results }) {
  const { dimResults, noiseResults } = results;
  const dim = dimResults.filter(Boolean).map(d => ({ x: +(d.x / NATURAL_E).toFixed(3), residAcc: d.residAcc, gmmAcc: d.gmmAcc, cemAcc: d.cemAcc }));
  const noi = noiseResults.filter(Boolean).map(d => ({ x: +(d.x / NATURAL_SD_MULT).toFixed(3), residAcc: d.residAcc, gmmAcc: d.gmmAcc, cemAcc: d.cemAcc }));

  // Headline: mean gap (residual minus GMM) across the swept range.
  const gap = (arr, a, b) => { const g = arr.filter(Boolean).filter(d => isFinite(d[a]) && isFinite(d[b])).map(d => d[a] - d[b]); return g.length ? g.reduce((s, x) => s + x, 0) / g.length : NaN; };
  const dimGap = gap(dimResults, "residAcc", "gmmAcc"), noiseGap = gap(noiseResults, "residAcc", "gmmAcc");
  const cemResidGap = gap(dimResults, "cemAcc", "residAcc");
  const atNat = dimResults.filter(Boolean).reduce((best, d) => Math.abs(d.x - NATURAL_E) < Math.abs(best.x - NATURAL_E) ? d : best, dimResults.filter(Boolean)[0]);

  const series = [
    { key: "residAcc", name: "Residual split (Saitta)", color: C.resid, width: 2.6 },
    { key: "cemAcc", name: "Seeded classification-EM", color: C.cem, width: 2.6, dash: "1 0" },
    { key: "gmmAcc", name: "Gaussian mixture (GMM)", color: C.gmm, width: 2.6 },
  ];
  const refs = [{ y: 50, color: C.chance, label: "50% = chance", pos: "insideBottomRight" }];

  return (
    <div>
      <div style={{ background: C.soft, borderLeft: `4px solid ${C.resid}`, padding: "14px 18px", marginBottom: "18px", fontSize: "13px", lineHeight: 1.65, color: "#3a3228" }}>
        <b style={{ color: C.navy }}>The headline:</b> adding a principled, age-aware method settles the question. The new{" "}
        <b style={{ color: C.cem }}>seeded classification-EM</b> — which fits two growth curves and assigns each animal to the curve it
        sits closer to <i>at its own age</i> — essentially <b>ties the crude residual rule</b> ({isFinite(cemResidGap) ? (cemResidGap >= 0 ? "+" : "") + cemResidGap.toFixed(1) : "--"} pts
        on average, i.e. no real difference), and <b>both beat the GMM at every level</b>. Near natural dimorphism the residual rule and
        the EM are correct about <b style={{ color: C.resid }}>{atNat ? atNat.residAcc.toFixed(0) : "--"}%</b> of the time vs about{" "}
        <b style={{ color: C.gmm }}>{atNat ? atNat.gmmAcc.toFixed(0) : "--"}%</b> for the GMM. Averaged across the dimorphism sweep the
        residual rule leads the GMM by <b>{isFinite(dimGap) ? dimGap.toFixed(1) : "--"}</b> points, and across noise by{" "}
        <b>{isFinite(noiseGap) ? noiseGap.toFixed(1) : "--"}</b>. The lesson: <b>the crude rule already sits at the accuracy ceiling</b> —
        a smarter classifier can match it but not beat it — and the GMM trails only because it discards the age axis (see <i>Why?</i>).
        The EM's real payoff is downstream, on the size-difference estimate (see <i>Effect</i>).
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "18px" }}>
        <CompareChart
          title="Accuracy vs. true dimorphism"
          subtitle="Size difference between sexes grows left→right (noise fixed at natural). Higher = better."
          data={dim} series={series} refLines={refs}
          xLabel={`True dimorphism (${NATURAL_LABEL})`} yLabel="% correctly sexed"
          yDomain={[40, 100]} yTicks={[40, 50, 60, 70, 80, 90, 100]} />
        <CompareChart
          title="Accuracy vs. measurement noise"
          subtitle="Residual scatter grows left→right (dimorphism fixed at natural). Higher = better."
          data={noi} series={series} refLines={refs}
          xLabel={`Noise (${NATURAL_LABEL})`} yLabel="% correctly sexed"
          yDomain={[40, 100]} yTicks={[40, 50, 60, 70, 80, 90, 100]} />
      </div>

      <div style={{ display: "flex", gap: 24, marginTop: 12, flexWrap: "wrap", padding: "0 4px" }}>
        <Swatch color={C.resid}>Residual split (Saitta)</Swatch>
        <Swatch color={C.cem}>Seeded classification-EM</Swatch>
        <Swatch color={C.gmm}>Gaussian mixture (GMM)</Swatch>
        <Swatch color={C.chance} dash>50% = pure chance (a coin flip)</Swatch>
      </div>

      <div style={{ marginTop: "20px", background: C.navy, color: "#e8dfc8", padding: "20px 26px" }}>
        <div style={{ fontSize: "11px", letterSpacing: "2px", textTransform: "uppercase", color: C.gold, marginBottom: "12px" }}>How to read these curves</div>
        <ul style={{ margin: 0, padding: "0 0 0 18px", lineHeight: 1.8, fontSize: "12px", color: "#ccc8bc" }}>
          <li><b>Residual vs EM (they overlap):</b> the bronze EM line sits almost exactly on the teal residual line. That is the point — once you use the age axis, a careful two-curve fit and a one-line "is the residual positive?" rule reach the <i>same</i> animals. The crude rule is not leaving accuracy on the table.</li>
          <li><b>Left (dimorphism):</b> at zero dimorphism all methods sit at 50% — none can invent sex information that isn't there. Accuracy climbs as the sexes separate, peaks near natural dimorphism, and <i>falls again at extreme dimorphism</i>: the combined curve fits each sex so poorly that young animals of both sexes get scrambled (curve-crossing in juveniles).</li>
          <li><b>Right (noise):</b> with the signal fixed, every method decays toward 50% as noise rises and drowns the size difference. The residual rule and the EM start higher (near-perfect at zero noise) and stay ahead of the GMM throughout.</li>
          <li><b>Why the GMM trails:</b> the residual rule and the EM both keep the age axis (the EM compares each animal to the two curves at its own age; the residual rule cuts at the combined curve, which sits between them). The GMM clusters one-dimensional residual <i>magnitudes</i> and ignores which age each came from, so it mislabels the young animals where the two curves nearly touch.</li>
        </ul>
      </div>
    </div>
  );
}

function EffectPanel({ results }) {
  const { dimResults, noiseResults } = results;
  const dim = dimResults.filter(Boolean).map(d => ({ x: +(d.x / NATURAL_E).toFixed(3), trueEff: d.trueEffect, residEff: d.residEff, gmmEff: d.gmmEff, cemEff: d.cemEff, gmmRej: d.gmmRejPct, cemRej: d.cemRejPct, residRej: d.residRejPct }));
  const noi = noiseResults.filter(Boolean).map(d => ({ x: +(d.x / NATURAL_SD_MULT).toFixed(3), trueEff: d.trueEffect, residEff: d.residEff, gmmEff: d.gmmEff, cemEff: d.cemEff, gmmRej: d.gmmRejPct, cemRej: d.cemRejPct, residRej: d.residRejPct }));
  const maxRej = Math.max(...dimResults.filter(Boolean).map(d => d.gmmRejPct), 0);
  const maxCemRej = Math.max(...dimResults.filter(Boolean).map(d => d.cemRejPct), 0);
  // Bias at the most extreme dimorphism point (estimate minus truth).
  const ext = dimResults.filter(Boolean).reduce((b, d) => d.x > b.x ? d : b, dimResults.filter(Boolean)[0]);
  const bias = (est) => (ext && isFinite(est) ? est - ext.trueEffect : NaN);
  const fmtBias = b => isFinite(b) ? (b >= 0 ? "+" : "") + b.toFixed(2) : "--";

  const series = [
    { key: "trueEff", name: "True difference", color: C.truth, width: 1.8, dash: "5 4" },
    { key: "residEff", name: "Residual split estimate", color: C.resid, width: 2.6 },
    { key: "cemEff", name: "Classification-EM estimate", color: C.cem, width: 2.6 },
    { key: "gmmEff", name: "GMM estimate", color: C.gmm, width: 2.6 },
  ];

  return (
    <div>
      <div style={{ background: C.soft, borderLeft: `4px solid ${C.cem}`, padding: "14px 18px", marginBottom: "18px", fontSize: "13px", lineHeight: 1.65, color: "#3a3228" }}>
        <b style={{ color: C.navy }}>Where the age-aware method pays off:</b> the three methods are tied on raw accuracy, but they differ
        sharply when you ask for the actual size difference (the gap in asymptotic length, L∞, between the sexes). At the most
        extreme dimorphism tested, the estimates miss the truth by <b style={{ color: C.gmm }}>{fmtBias(bias(ext && ext.gmmEff))} m</b> (GMM),{" "}
        <b style={{ color: C.resid }}>{fmtBias(bias(ext && ext.residEff))} m</b> (residual), and only{" "}
        <b style={{ color: C.cem }}>{fmtBias(bias(ext && ext.cemEff))} m</b> (classification-EM). The GMM is by far the most biased; the
        residual rule and the EM are both near-unbiased, with the EM typically trimming the mild overshoot the residual rule still shows at
        extreme dimorphism. Just as important, the EM is <b>robust</b> — the L∞ guard discards up to{" "}
        <b style={{ color: C.gmm }}>{maxRej.toFixed(0)}%</b> of GMM runs as biologically implausible, but only{" "}
        <b style={{ color: C.cem }}>{maxCemRej.toFixed(0)}%</b> of EM runs. So if your scientific question is "how different are the
        sexes?", the seeded EM is the method to reach for: Saitta's accuracy, without the GMM's fragility.
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "18px" }}>
        <CompareChart
          title="Estimated vs. true difference — dimorphism sweep"
          subtitle="Closer to the dashed truth line = less biased. Noise fixed at natural."
          data={dim} series={series}
          xLabel={`True dimorphism (${NATURAL_LABEL})`} yLabel="L∞ difference (m)" />
        <CompareChart
          title="Estimated vs. true difference — noise sweep"
          subtitle="Truth is flat at natural dimorphism; watch each method drift. Dimorphism fixed at natural."
          data={noi} series={series}
          xLabel={`Noise (${NATURAL_LABEL})`} yLabel="L∞ difference (m)" />
      </div>

      <div style={{ display: "flex", gap: 24, marginTop: 12, flexWrap: "wrap", padding: "0 4px" }}>
        <Swatch color={C.truth} dash>True difference</Swatch>
        <Swatch color={C.resid}>Residual split estimate</Swatch>
        <Swatch color={C.cem}>Classification-EM estimate</Swatch>
        <Swatch color={C.gmm}>GMM estimate</Swatch>
      </div>

      <CompareChart
        title="Degenerate-fit rate (the GMM's hidden cost)"
        subtitle="Percentage of runs where a refitted VB curve was biologically implausible (L∞ outside 0.5–10 m) and had to be discarded. Lower = more reliable."
        data={dim.map(d => ({ x: d.x, gmmRej: d.gmmRej, cemRej: d.cemRej, residRej: d.residRej }))}
        series={[
          { key: "residRej", name: "Residual split", color: C.resid, width: 2.4 },
          { key: "cemRej", name: "Classification-EM", color: C.cem, width: 2.4 },
          { key: "gmmRej", name: "GMM", color: C.gmm, width: 2.4 },
        ]}
        xLabel={`True dimorphism (${NATURAL_LABEL})`} yLabel="% runs discarded" yDomain={[0, "auto"]} />
      <div style={{ marginTop: "18px", background: C.navy, color: "#e8dfc8", padding: "20px 26px" }}>
        <div style={{ fontSize: "11px", letterSpacing: "2px", textTransform: "uppercase", color: C.gold, marginBottom: "12px" }}>Why the L∞ guard matters — and why the EM barely needs it</div>
        <p style={{ margin: 0, fontSize: "12px", lineHeight: 1.8, color: "#ccc8bc" }}>
          At extreme dimorphism the GMM frequently mis-clusters the residuals, handing a refitted VB curve a lopsided, age-skewed
          subset. The optimizer then runs off to absurd asymptotes (L∞ of tens or hundreds of metres). Without a guard, a few such
          runs would dominate the average and the GMM's effect curve would explode upward. The guard rejects any refit with L∞
          outside 0.5–10&nbsp;m (alligators live near 2.8–5.3&nbsp;m), so the plotted GMM estimate reflects only its <i>plausible</i>
          fits — a charitable presentation that still trails. The discard curve above is itself a reliability signal: the GMM throws
          out a large share of its runs, while the residual split and the seeded EM hug the bottom near zero. The EM stays well
          behaved because it is seeded by the residual split (a balanced, sensible starting partition) and it reassigns animals using
          age, so neither group collapses into the degenerate subsets that wreck a cold-start mixture.
        </p>
      </div>
    </div>
  );
}

function BetterPanel({ nPerSex }) {
  const [knownSweep, setKnownSweep] = useState(null);
  const [traitSweep, setTraitSweep] = useState(null);
  const [busyA, setBusyA] = useState(true);
  const [busyB, setBusyB] = useState(true);
  const [knownMode, setKnownMode] = useState("female");
  const [delta, setDelta] = useState(0.10);
  const [seed, setSeed] = useState(0);
  const [scatter, setScatter] = useState(null);

  useEffect(() => {
    setBusyA(true);
    const t = setTimeout(() => {
      const fracs = knownMode === "female" ? [0, 0.1, 0.2, 0.3, 0.4] : [0, 0.15, 0.3, 0.45, 0.6, 0.75];
      const A = runKnownSweep(nPerSex, NATURAL_E, NATURAL_SD_MULT, fracs, 25, knownMode === "female");
      setKnownSweep(A); setBusyA(false);
    }, 20);
    return () => clearTimeout(t);
  }, [nPerSex, knownMode]);

  useEffect(() => {
    setBusyB(true);
    const t = setTimeout(() => {
      const B = runTraitSweep(nPerSex, NATURAL_E, NATURAL_SD_MULT, [0, 0.02, 0.05, 0.08, 0.10, 0.15, 0.20], 25);
      setTraitSweep(B); setBusyB(false);
    }, 20);
    return () => clearTimeout(t);
  }, [nPerSex]);

  useEffect(() => {
    let s = null; for (let t = 0; t < 8 && !s; t++) s = simBivar(nPerSex, NATURAL_E, NATURAL_SD_MULT, delta);
    setScatter(s);
  }, [delta, seed, nPerSex]);

  let malePts = [], femPts = [], lineGrid = [], biAcc = null, szAcc = null, trAcc = null, corr = null;
  if (scatter) {
    const ratio = scatter.headW.map((h, i) => h / scatter.lens[i]);
    const bi = fitBivarCEM(scatter.ages, scatter.lens, ratio, NATURAL_SD_MULT, scatter.aAssignMale);
    const sz = fitCEM(scatter.ages, scatter.lens, NATURAL_SD_MULT, scatter.aAssignMale);
    const tr = fitTraitOnly(ratio);
    scatter.lens.forEach((L, i) => { const p = { len: +(L * 100).toFixed(1), hw: +(scatter.headW[i] * 100).toFixed(1) }; (scatter.trueMale[i] ? malePts : femPts).push(p); });
    const lo = Math.min(...scatter.lens) * 100, hi = Math.max(...scatter.lens) * 100;
    lineGrid = [lo, hi].map(x => ({ len: +x.toFixed(1), fem: +(HEAD_RATIO * x).toFixed(2), male: +(HEAD_RATIO * (1 + delta) * x).toFixed(2) }));
    biAcc = bi ? accuracyOn(bi.assignMale, scatter.trueMale) : null;
    szAcc = sz ? accuracyOn(sz.assignMale, scatter.trueMale) : null;
    trAcc = accuracyOn(tr, scatter.trueMale);
    corr = pearson(scatter.headW, scatter.lens);
  }

  return (
    <div>
      <div style={{ background: C.navy, color: "#e8dfc8", padding: "16px 22px", marginBottom: 18 }}>
        <div style={{ fontSize: 11, letterSpacing: 2, textTransform: "uppercase", color: C.gold, marginBottom: 6 }}>The honest ceiling</div>
        <p style={{ margin: 0, fontSize: 12.5, lineHeight: 1.7, color: "#ddd8cc" }}>
          The residual rule is hard to beat because, for a <i>single</i> size trait, the limit on sex assignment is the <b>overlap of the two sexes' size
          distributions</b> (the best any method could do is called the Bayes error) — and the residual rule already sits at that limit. Doing better means
          adding <b>information the residual rule never sees.</b> Two natural sources: <b>Route&nbsp;1</b>, specimens whose sex is known independently; and
          <b> Route&nbsp;2</b>, a second sexually dimorphic trait. They behave very differently — explore both.
        </p>
      </div>

      {/* ROUTE 1 */}
      <h3 style={{ fontSize: 15, color: C.navy, fontWeight: "normal", margin: "0 0 4px", borderBottom: `2px solid ${C.gold}`, paddingBottom: 4 }}>Route 1 · Anchor on specimens whose sex is known</h3>
      <p style={{ fontSize: 12.5, lineHeight: 1.7, color: "#3a3228", margin: "8px 0 12px" }}>
        Sometimes a few individuals can be sexed directly. Two limits apply. First, <b>only sexually mature animals</b> can be sexed at all — reproductive
        traces, and most morphological or genetic markers, simply aren't expressed in juveniles; we take maturity at ≈ age {MATURE_AGE} (≈1.8 m, typical for
        American alligators). Second, <b>which</b> sex the evidence reveals: reproductive traces — eggshell-related bone resorption recorded in osteoderms, or
        eggs preserved <i>in situ</i> with a skeleton — identify <b>females only</b>; you cannot confirm a male that way. An independent method (say, genetics
        from exceptional preservation) might instead sex a <i>random mix of both</i> mature individuals. Use the toggle to switch which is modelled. The known
        individuals are fed into the classification-EM as <b>fixed anchors</b> (never reassigned). Two accuracies are worth separating: accuracy <i>overall</i>
        (which includes the specimens we already knew) and accuracy on only the <i>still-unknown</i> specimens (the ones the method had to infer).
      </p>
      <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap", marginBottom: 10, fontSize: 12 }}>
        <span style={{ color: C.label, fontWeight: "bold" }}>Which individuals can be sexed directly?</span>
        {[["female", "Females only (reproductive traces)"], ["both", "A random mix of both sexes"]].map(([id, lbl]) => (
          <button key={id} onClick={() => setKnownMode(id)} style={{ padding: "5px 11px", border: `1px solid ${knownMode === id ? C.navy : C.line}`, background: knownMode === id ? C.navy : "none", color: knownMode === id ? C.cream : C.navy, cursor: "pointer", fontFamily: "inherit", fontSize: 12 }}>{lbl}</button>
        ))}
      </div>
      {busyA || !knownSweep ? (
        <div style={{ height: 250, border: `1px dashed ${C.line}`, display: "flex", alignItems: "center", justifyContent: "center", color: "#8a7a5a", fontStyle: "italic", fontSize: 12 }}>Running the known-sex sweep…</div>
      ) : (
        <CompareChart
          title={knownMode === "female" ? "Anchoring on known FEMALES only (body size, natural dimorphism)" : "Anchoring on a random mix of both sexes (body size, natural dimorphism)"}
          subtitle={"x: percentage of ALL specimens whose true sex is supplied as fixed anchors (only sexually mature animals qualify). Solid = overall accuracy (counts the known specimens); dashed = accuracy on only the still-unknown specimens; dotted = the residual rule with no anchors." + (knownMode === "female" ? " Mature FEMALES are only ~40% of the assemblage here, so the curve stops near 40%." : " Mature individuals are only ~80% of the assemblage here, so the curve stops near 80%.")}
          data={knownSweep}
          series={[
            { key: "overallAcc", name: "Overall accuracy (includes the known specimens)", color: C.cem, width: 2.8 },
            { key: "unknownAcc", name: "Accuracy on still-UNKNOWN specimens", color: C.resid, width: 2.6, dash: "6 4" },
            { key: "residAcc", name: "Residual rule, no anchors (baseline)", color: "#9a8f78", width: 1.6, dash: "2 3" },
          ]}
          xLabel="Sexes known independently (% of all specimens)" yLabel="Accuracy (%)" yDomain={[40, 100]} yTicks={[40, 60, 80, 100]} />
      )}
      <div style={{ background: "#f3eee6", borderLeft: `4px solid ${C.cem}`, padding: "12px 16px", marginTop: 10, fontSize: 12, lineHeight: 1.65, color: "#3a3228" }}>
        <b style={{ color: C.navy }}>What this shows.</b> Overall accuracy rises as you anchor more mature animals — each is one you are now certain about, and anchors
        also pin the orientation of the split and tighten the effect-size estimate, so direct sexing is genuinely worthwhile.
        {knownMode === "female"
          ? <> The gain is one-sided and caps near 40% known here: you can never confirm a male, and you can never sex a juvenile, so only mature females qualify.</>
          : <> It caps near 80% known here, because juveniles still cannot be sexed directly.</>} But watch the dashed line: accuracy on the <i>still-unknown</i>
        specimens does <b>not</b> improve — it actually drifts <b>down</b>. No individual is getting harder to classify; this is a <b>composition effect</b>. The
        anchors are all mature animals, i.e. precisely the size range where the two sexes are already well separated, so removing them from the unknown pool leaves
        it increasingly dominated by <b>juveniles</b> — whose male and female sizes overlap almost completely and are intrinsically near-unclassifiable. So direct
        sexing certifies specimens you could already classify well and cannot reach the ones that are genuinely ambiguous. The residual/EM methods are
        <b> already at the overlap ceiling</b> on the size axis; to do better on the hard cases you need different information — which is Route 2.
      </div>

      {/* ROUTE 2 */}
      <h3 style={{ fontSize: 15, color: C.navy, fontWeight: "normal", margin: "26px 0 4px", borderBottom: `2px solid ${C.gold}`, paddingBottom: 4 }}>Route 2 · Add a second dimorphic trait (head/skull width)</h3>
      <div style={{ fontSize: 12.5, lineHeight: 1.7, color: "#3a3228", margin: "8px 0 12px" }}>
        Male alligators grow not only larger but also relatively <b>broader-headed</b>. We add a second measurement, <b>head width</b> (skull width across the
        jaws, in cm). The catch you raised: head width is largely a function of body size — a bigger gator simply has a bigger head — so on its own it mostly
        repeats what body size already told us. The terms used below:
        <ul style={{ margin: "6px 0 0 18px", padding: 0, lineHeight: 1.6 }}>
          <li><b>Body length</b> — total length (cm), the size trait the residual rule already uses.</li>
          <li><b>Head width</b> — skull width across the jaws (cm). Modeled as ≈{(HEAD_RATIO * 100).toFixed(0)}% of body length for females, with individual scatter.</li>
          <li><b>Relative head breadth</b> — head width ÷ body length (a unitless proportion). This removes overall size, leaving only head <i>shape</i>.</li>
          <li><b>δ (the slider)</b> — the <b>size-independent head-shape dimorphism</b>: how much broader a male's head is than a female's <i>of the same body length</i>, in percent. δ = 0 means males' heads are bigger only because males are bigger (head width is then a pure size proxy — fully redundant). δ &gt; 0 means males are broad-headed beyond what their size predicts — genuinely new information.</li>
        </ul>
      </div>
      {busyB || !traitSweep ? (
        <div style={{ height: 250, border: `1px dashed ${C.line}`, display: "flex", alignItems: "center", justifyContent: "center", color: "#8a7a5a", fontStyle: "italic", fontSize: 12 }}>Running the second-trait sweep…</div>

          subtitle="Accuracy of three classifiers as δ grows: body size alone, relative head breadth alone, and both combined in a bivariate classification-EM. At δ = 0 head width is a pure size proxy and adds nothing (combined ≈ size-only); as δ grows, the size-independent head-shape signal lets the combined classifier pull ahead."
          data={traitSweep}
          series={[

      )}

      <div style={{ background: C.panel, border: `1px solid ${C.line}`, padding: 14, marginTop: 10 }}>
        <div style={{ display: "flex", gap: 14, alignItems: "center", flexWrap: "wrap", marginBottom: 8 }}>
          <span style={{ fontSize: 12, color: C.label, fontWeight: "bold" }}>Head-shape dimorphism δ</span>
          <input type="range" min={0} max={0.2} step={0.01} value={delta} onChange={e => setDelta(+e.target.value)} style={{ flex: 1, minWidth: 160 }} />
          <span style={{ fontVariantNumeric: "tabular-nums", color: C.navy, minWidth: 92 }}>{(delta * 100).toFixed(0)}% broader ♂</span>
          <button onClick={() => setSeed(s => s + 1)} style={{ padding: "5px 12px", background: "none", border: `1px solid ${C.line}`, color: C.navy, cursor: "pointer", fontFamily: "inherit", fontSize: 12 }}>New sample</button>
        </div>
        <div style={{ fontSize: 12, fontWeight: "bold", color: C.navy, marginBottom: 2 }}>Head width vs. body length, one sample</div>
        <div style={{ fontSize: 10, color: "#8a7a5a", fontStyle: "italic", marginBottom: 6 }}>
          Each dot is a specimen, colored by <i>true</i> sex; lines are the female and male head-width-for-length trends. The points hug those lines — that tight
          climb is the strong head-width/body-size correlation (r ≈ {corr != null && isFinite(corr) ? corr.toFixed(2) : "--"}). The only sexing information beyond
          body size is the <i>gap between the two lines</i> — the male line sits above the female line by δ. At δ = 0 the lines coincide and head width tells you nothing new.
        </div>
        <ResponsiveContainer width="100%" height={300}>
          <ComposedChart margin={{ top: 8, right: 18, left: 8, bottom: 30 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#ede8dd" />
            <XAxis type="number" dataKey="len" domain={["auto", "auto"]} tick={{ fontSize: 9 }} label={{ value: "Body length (cm)", position: "bottom", offset: -2, style: { fontSize: 10, fill: C.label } }} />
            <YAxis type="number" domain={["auto", "auto"]} tick={{ fontSize: 9 }} width={48} label={{ value: "Head width (cm)", angle: -90, position: "insideLeft", style: { fontSize: 10, fill: C.label, textAnchor: "middle" } }} />
            <Tooltip cursor={{ strokeDasharray: "3 3" }} contentStyle={{ fontFamily: "Georgia,serif", fontSize: 10, border: `1px solid ${C.line}` }} />
            <Line data={lineGrid} dataKey="fem" stroke={C.female} strokeWidth={1.6} strokeDasharray="5 4" dot={false} isAnimationActive={false} name="female trend" />
            <Line data={lineGrid} dataKey="male" stroke={C.male} strokeWidth={1.6} strokeDasharray="5 4" dot={false} isAnimationActive={false} name="male trend" />
            <Scatter data={femPts} dataKey="hw" fill={C.female} fillOpacity={0.75} name="true ♀" isAnimationActive={false} />
            <Scatter data={malePts} dataKey="hw" fill={C.male} fillOpacity={0.75} name="true ♂" isAnimationActive={false} />
            <Legend verticalAlign="top" height={22} wrapperStyle={{ fontSize: 11 }} />
          </ComposedChart>
        </ResponsiveContainer>
        {biAcc != null && szAcc != null && trAcc != null && (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10, marginTop: 8, fontSize: 12, textAlign: "center" }}>
            <div style={{ background: C.soft, border: `1px solid ${C.line}`, padding: "8px 6px" }}>Body size only<br /><b style={{ color: C.resid, fontSize: 15 }}>{szAcc.toFixed(0)}%</b></div>
            <div style={{ background: C.soft, border: `1px solid ${C.line}`, padding: "8px 6px" }}>Relative head breadth only<br /><b style={{ color: C.gmm, fontSize: 15 }}>{trAcc.toFixed(0)}%</b></div>
            <div style={{ background: "#eaf2ec", border: "1px solid #bcd6c4", padding: "8px 6px" }}>Both combined<br /><b style={{ color: C.cem, fontSize: 15 }}>{biAcc.toFixed(0)}%</b></div>
          </div>
        )}
      </div>
      <div style={{ background: "#eaf2ec", borderLeft: "4px solid #2a6d4f", padding: "12px 16px", marginTop: 10, fontSize: 12, lineHeight: 1.65, color: "#3a3228" }}>
        <b style={{ color: "#2a6d4f" }}>The lesson.</b> Head width correlates almost perfectly with body size (r ≈ {corr != null && isFinite(corr) ? corr.toFixed(2) : "0.98"}),
        so used naively it is largely redundant — which is exactly why the combined line barely moves at small δ. The combined classifier beats body size alone
        only to the extent the second trait carries a <i>size-independent</i> sexual difference (the line gap, δ). The practical rule for picking a second
        measurement: redundant size proxies add little, but a structure with its own sexual dimorphism in <i>shape</i> (here, broad-headedness for one's length)
        adds a genuinely new axis and lifts accuracy above the single-trait ceiling.
      </div>
    </div>
  );
}
