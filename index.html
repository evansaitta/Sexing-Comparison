              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 10 }}>
                {sel.items.map((it, i) => (
                  <div key={i} style={{ border: `2px solid ${it.detected ? "#2a6d4f" : "#c9bda2"}`, background: "#fff", padding: 5 }}>
                    <ResponsiveContainer width="100%" height={110}>
                      <ComposedChart margin={{ top: 4, right: 6, left: 0, bottom: 0 }}>
                        <XAxis dataKey="age" type="number" domain={["auto", "auto"]} hide />
                        <YAxis type="number" domain={["auto", "auto"]} hide />
                        <Line data={it.grid} dataKey="hi" stroke={C.male} strokeWidth={1.4} dot={false} isAnimationActive={false} />
                        <Line data={it.grid} dataKey="lo" stroke={C.female} strokeWidth={1.4} dot={false} isAnimationActive={false} />
                        <Scatter data={it.pts} dataKey="size" isAnimationActive={false}>
                          {it.pts.map((p, j) => <Cell key={j} fill={p.male ? C.male : C.female} />)}
                        </Scatter>
                      </ComposedChart>
                    </ResponsiveContainer>
                    <div style={{ fontSize: 9.5, textAlign: "center", color: it.detected ? "#2a6d4f" : "#8a7a5a", fontWeight: "bold" }}>
                      {it.detected ? "two curves" : "one curve"} · ΔBIC {it.dBIC >= 0 ? "+" : ""}{it.dBIC.toFixed(1)}
                    </div>
                  </div>
                ))}
              </div>
              <div style={{ fontSize: 11.5, color: "#6a5a3a", marginTop: 8 }}>
                BIC selected two curves in <b>{sel.nDet} of these 6</b> examples. Across all {POW_REPS} simulations at E = {sel.d}%, the test detects{" "}
                <b>{isFinite(sel.power) ? sel.power.toFixed(0) : "--"}%</b> of the time — that is the height of the curve at this point.
              </div>
            </div>
          )}


          <div style={{ marginTop: 16, background: C.navy, color: "#e8dfc8", padding: "20px 26px" }}>
            <div style={{ fontSize: 11, letterSpacing: 2, textTransform: "uppercase", color: C.gold, marginBottom: 12 }}>Interpreting the output</div>
            <p style={{ margin: "0 0 10px", fontSize: 12.5, lineHeight: 1.75, color: "#ddd8cc" }}>
              {detected
                ? <>BIC selects the two-curve model (ΔBIC = +{r.obsDBIC.toFixed(1)}), with the larger component's asymptote about <b>{effPct.toFixed(0)}%</b> above
                  the smaller. In the calibration, <b>{r.nullGe} of {r.nullTot}</b> datasets simulated under the single-curve model (same ages, same fitted σ)
                  reached a ΔBIC this large, giving a bootstrap p-value of <b>{r.nullGe === 0 ? "< " + (1 / (r.nullTot + 1)).toFixed(3) : (r.pValue / 100).toFixed(3)}</b>. {r.pValue <= 5 ? "At the conventional α = 0.05 this is statistically significant — a ΔBIC this large is unlikely under a single group. (Note the p-value is bounded below by the number of resamples, so it cannot be resolved beyond ≈" + (1 / (r.nullTot + 1)).toFixed(3) + " here.)" : r.pValue <= 15 ? "This exceeds α = 0.05, so the two-curve preference is not significant at the conventional threshold; treat it as suggestive only." : "This is far above α = 0.05; a single group reproduces a ΔBIC this large frequently, so the result is not statistically meaningful."}</>
                : <>BIC does not select the two-curve model (ΔBIC = {r.obsDBIC.toFixed(1)} ≤ 0). This is a non-rejection of the single-curve model, not evidence
                  that the groups are identical.
                  {r.power80 != null ? <> From the power curve, this sample attains 80% power only at an asymptote difference of ≈ <b>{r.power80.toFixed(0)}%</b>; smaller true differences would go undetected most of the time.</> : <> From the power curve, power stays low across the range tested, so even moderate true differences would frequently go undetected.</>} A negative result therefore bounds the effect size the data could have detected; it does not establish its absence.</>}
            </p>
            <ul style={{ margin: 0, padding: "0 0 0 18px", lineHeight: 1.75, fontSize: 12, color: "#ccc8bc" }}>
              <li><b>Power depends on the age distribution.</b> The <i>Maiasaura</i> default has 29 specimens at age 0.5 and ~17 older; the asymptote difference is only identifiable from animals near the asymptote, so most of the sample contributes little power. Sample size alone does not guarantee power.</li>
              <li><b>Model 2 detects a binary split in growth, not "sex" per se.</b> A selected two-curve model is consistent with sexual dimorphism but also with two species, two populations, different growth environments, or sampling/preservation artefacts. The test identifies structure, not its biological cause.</li>
              <li><b>Results are conditional on assumptions:</b> the chosen growth function (selector above), a fixed 50:50 split between the two groups, equal and constant residual scatter for both groups (the same σ everywhere — "homoscedastic"), and ages treated as error-free. Skeletochronological age error in particular is not propagated, so p-values and power are optimistic to that extent.</li>
            </ul>
          </div>
        </div>
      )}
    </div>
  );
}

function AboutPanel() {
  const Section = ({ title, children }) => (
    <div style={{ marginBottom: "22px" }}>
      <div style={{ fontSize: "11px", letterSpacing: "2px", textTransform: "uppercase", color: C.gold, marginBottom: "8px", borderBottom: `1px solid ${C.line}`, paddingBottom: "4px" }}>{title}</div>
      <div style={{ fontSize: "13px", lineHeight: 1.75, color: "#3a3228" }}>{children}</div>
    </div>
  );
  // A formula rendered on its own centered line, with an optional caption below.
  const Fml = ({ children, note }) => (
    <div style={{ margin: "10px 0" }}>
      <div style={{ fontFamily: "Georgia, 'Times New Roman', serif", fontSize: "15px", color: C.navy, textAlign: "center", padding: "6px 0" }}>{children}</div>
      {note && <div style={{ fontSize: "11.5px", color: "#6a5a3a", textAlign: "center", lineHeight: 1.5 }}>{note}</div>}
    </div>
  );
  const Term = ({ children }) => <div style={{ margin: "10px 0 2px", fontSize: "12.5px", color: "#3a3228" }}>{children}</div>;
  return (
    <div style={{ maxWidth: "860px", background: C.panel, border: `1px solid ${C.line}`, padding: "28px 34px" }}>
      <Section title="The question">
        Saitta et al. (2020) tested for sexual dimorphism in alligators by fitting one growth (von Bertalanffy) curve to all
        specimens, then splitting them into a larger and a smaller group by the <b>sign of each specimen's residual</b> (whether it
        sat above or below the combined curve). A natural objection: surely a proper clustering method would split the two sexes
        more cleanly than a crude above/below rule? This simulator puts that objection to the test by comparing the residual rule
        against two alternatives — a <b style={{ color: C.gmm }}>two-component Gaussian mixture (GMM)</b> on the residuals, and a{" "}
        <b style={{ color: C.cem }}>seeded classification-EM</b> that fits two whole growth curves — on data where the true sex of
        every specimen is known. The short answer: the two age-aware methods (residual rule and classification-EM) tie at the top and
        both beat the GMM on accuracy, but the classification-EM gives the least-biased, most reliable estimate of the size difference.
      </Section>

      <Section title="Plain-language glossary — start here if statistics isn't your thing">
        <div style={{ fontSize: 12.5, lineHeight: 1.7 }}>
          {[
            ["Growth curve", "a line showing how big an animal is at each age — rising fast when young, then flattening as it matures."],
            ["von Bertalanffy / logistic / Gompertz", "three standard shapes for that curve. Von Bertalanffy flattens from the very start (good for reptiles and fish); logistic and Gompertz are S-shaped, with a fast juvenile growth spurt before flattening (better for dinosaurs)."],
            ["Asymptote (written L∞, “L-infinity”)", "the adult size the curve levels off at — essentially the final, fully-grown size."],
            ["Monomorphic fit", "fitting a single growth curve as if every animal grew the same way — i.e. pretending there's no sex difference."],
            ["Sexual dimorphism / effect size (E)", "how much bigger one sex grows than the other. The “effect size” is just the size of that gap."],
            ["Residual", "for one animal, how far it sits above (+) or below (–) the fitted curve. A big positive residual = unusually large for its age."],
            ["Gaussian (normal) distribution", "the familiar bell-shaped curve — most values near the middle, fewer out at the edges."],
            ["Gaussian mixture model (GMM)", "the assumption that your data are really two overlapping bell curves blended together; the math tries to pull them apart."],
            ["Posterior probability", "after seeing the data, the estimated chance that a given animal belongs to one group rather than the other."],
            ["EM = Expectation–Maximization", "a back-and-forth recipe for fitting two groups when you don't know who belongs to which: (1) guess the groups and fit a curve to each; (2) re-assign every animal to whichever curve it now fits better; (3) refit the curves; repeat until nothing changes. The “Expectation” step is the re-assigning; the “Maximization” step is the refitting."],
            ["Classification-EM", "EM that gives each animal a firm yes/no label each round (rather than a soft probability). Method C is this, started from Saitta's split so it doesn't wander off to a bad answer."],
            ["Likelihood", "a number for how well a model matches the data — higher means the model explains what we see more closely."],
            ["BIC (Bayesian Information Criterion)", "a score that rewards a better fit but charges a penalty for every extra knob a model adds. So a more complex model (two curves) only “wins” if it fits clearly better than the simple one. Lower BIC = preferred."],
            ["Detection vs. classification", "“Is there a size difference at all?” (detection) is a far easier question than “Which sex is THIS particular animal?” (classification). When sexes overlap, detection can still succeed where classification is hopeless."],
            ["p-value", "the chance of seeing a result at least this strong if there were truly no difference. Small (say < 0.05) means the result is unlikely to be a fluke."],
            ["Statistical power", "the chance your study actually catches a real difference of a given size. Low power means a real difference could easily slip past unnoticed."],
            ["False positive (false alarm)", "claiming a difference exists when it really doesn't."],
            ["Parametric bootstrap", "a calibration trick: build hundreds of fake datasets from a known model (e.g. one with no difference) and re-run the test on each, to learn how the test behaves and how often it's fooled."],
            ["Skeletochronology / LAGs", "estimating a fossil's age by counting growth rings (Lines of Arrested Growth) in its bones, much like tree rings."],
            ["Bayes error (overlap ceiling)", "the lowest error rate ANY classifier can achieve when two groups overlap. Where male and female sizes overlap, some individuals are genuinely ambiguous, and no method — however clever — can label them all correctly. The residual rule already reaches this ceiling for body size."],
            ["Semi-supervised / anchor", "classification where the true labels of SOME individuals are known and held fixed (anchored); the method must infer the rest. Used in Route 1, where a random subset of specimens is sexed independently."],
            ["Allometry", "how a body part scales with overall size. Head/skull width grows with body length, so big animals have big heads regardless of sex — which is why head width alone is mostly a size proxy."],
            ["Bivariate / multivariate classifier", "a classifier that uses two (or more) measurements at once. Two weak, independent sex signals (e.g. body size and head shape) can combine into a stronger one than either alone (Route 2)."],
          ].map(([t, d], i) => (
            <div key={i} style={{ marginBottom: 7 }}><b style={{ color: C.navy }}>{t}.</b> {d}</div>
          ))}
        </div>
      </Section>

      <Section title="The data (identical for all three methods)">
        Each simulated dataset contains <b>N females and N males</b>. Females follow the alligator female growth curve
        (Wilkinson &amp; Rhodes 1997); males follow the male curve, whose asymptotic length L∞ exceeds the female's by the effect size <b>E</b> (in
        metres). Following Saitta, the male curve's growth-rate parameters also shift slightly with E, so it is not merely the female curve raised by a
        constant — at large E the two curves can even cross in juveniles. Body-length scatter at each age follows Saitta's own noise function. All three methods are always run on the{" "}
        <i>same</i> generated dataset, so any difference between them is the method, not luck.
      </Section>

      <Section title="Method A — Residual split (Saitta)">
        Fit one combined VB curve to all specimens. For each specimen, compute its residual (observed length minus curve
        prediction). Assign every specimen with a <b style={{ color: C.resid }}>positive residual</b> to the larger ("male") group and
        every specimen with a non-positive residual to the smaller ("female") group. The decision boundary is simply the fitted
        curve itself.
      </Section>

      <Section title="Finding the two groups when nobody labelled them — EM in plain English">
        Methods B and C both have to split the animals into two sexes without ever being told who is who. That is <b>unsupervised
        clustering</b>, and both use the same classic idea: <b>EM (Expectation–Maximization)</b>. Here it is with no jargon.
        <div style={{ margin: "8px 0", padding: "8px 12px", background: "#fff", border: `1px solid ${C.line}` }}>
          <b>The chicken-and-egg puzzle.</b> Imagine you tip two bags of marbles — a "small" bag and a "large" bag — into one pile, and the
          sizes overlap enough that you can't tell which bag a borderline marble came from. If someone told you each bag's typical size, you
          could drop every marble into the nearer one. And if someone told you which marble came from which bag, you could measure each bag's
          typical size. You have neither — and each would hand you the other. EM breaks the deadlock by guessing one and bouncing back and forth:
          <ol style={{ margin: "6px 0 0 18px", padding: 0, lineHeight: 1.6 }}>
            <li><b>Guess</b> a starting split into two groups (any sensible guess will do).</li>
            <li><b>Describe each group</b> from its current members — its average and its spread. <i>(the "M", Maximization, step)</i></li>
            <li><b>Re-sort every item</b> into whichever group it now looks more like. <i>(the "E", Expectation, step)</i></li>
            <li><b>Repeat</b> steps 2–3. Each pass the two descriptions sharpen and fewer items switch sides, until nothing moves. That stable split is the answer.</li>
          </ol>
        </div>
        The two methods are just this loop with different details.
        <div style={{ margin: "6px 0 0" }}>
          <b style={{ color: C.gmm }}>Method B (GMM)</b> runs the loop <b>on the residuals</b>, with <b>soft votes</b>. It assumes the pile of
          residuals is really <i>two overlapping bell curves</i> (one per sex) added together, and EM finds each bell's centre, width, and the
          share of animals it owns. "Soft" means an animal isn't forced into one bell — it gets a <i>probability</i> ("this residual is 70%
          likely to be from the upper bell"), and the group descriptions are updated using those probabilities as weights. At the end each
          animal is given to whichever bell it most probably belongs to (over 50%). The catch: the GMM only ever sees the residual numbers — it
          has thrown the age away.
        </div>
        <div style={{ margin: "6px 0 0" }}>
          <b style={{ color: C.cem }}>Method C (classification-EM)</b> runs the same loop <b>on the growth curves</b>, with <b>hard votes</b>,
          keeping age. Each group's "description" is a whole growth curve (size vs. age), and the re-sort step asks, for each animal, which
          sex's curve it sits closer to <i>at its own age</i> — so a small animal is judged against where each curve says it should be at that
          age, not merely by being small. It commits each animal fully to one group ("hard") rather than splitting its vote, and starting from
          Saitta's residual split keeps it from wandering into a bad answer.
        </div>
        So both are the same guess-and-refine loop; the GMM does it in one dimension on residuals with soft probabilities, while Method&nbsp;C
        does it with age-aware growth curves and hard assignments. The precise formulas for each are in the two sections below.
      </Section>

      <Section title="Method B — Gaussian mixture on residuals (GMM)">
        Take those same residuals and fit a <b style={{ color: C.gmm }}>two-component Gaussian mixture</b> by Expectation-Maximisation:
        the model assumes the residuals come from two overlapping bell curves (one per sex) and estimates each bell's mean, spread,
        and weight. Each specimen then gets a <i>posterior probability</i> of belonging to each component; we assign it to whichever
        component is more probable (a hard cut at probability 0.5). The higher-mean component is the larger ("male") group. Crucially,
        the GMM sees only the residual <i>values</i> — it never sees which age each residual came from.
      </Section>

      <Section title="Method C — Seeded classification-EM (two growth curves)">
        <b>EM</b> stands for <b>Expectation–Maximization</b>, a standard back-and-forth recipe for sorting data into groups when you don't
        know who belongs to which (see the glossary above). This method is the principled version of what the GMM was reaching for.{" "}
        <b style={{ color: C.cem }}>Start from Saitta's residual split</b> as an initial guess, then repeat two steps until the labels stop
        moving: (1) fit a separate VB growth curve to each tentative group; (2) reassign every specimen to whichever curve it is more
        likely to have come from <i>at its own age</i> (a Gaussian likelihood using the age-dependent scatter). Step 2 is the
        “Expectation” part, step 1 is the “Maximization” part. Unlike the GMM, it keeps the age axis — each animal is judged against the
        two curves at its actual age, not by a one-dimensional residual magnitude. Seeding it with the residual split is what keeps it
        stable: a cold-start mixture wanders into bad solutions, but starting from a sensible balanced partition lets it converge reliably.
      </Section>

      <Section title="Method D — Detection, not classification (the Detecting Dimorphism tab)">
        The other three methods label individuals; this one refuses to. When sexes overlap heavily, no per-animal label can beat chance —
        but a population-level <i>difference</i> can still be detected. We fit a <b>single</b> VB curve (the no-dimorphism model) and a{" "}
        <b>two-curve 50/50 mixture</b> (fit by soft EM — the labels stay probabilities rather than hard yes/no — seeded by the residual split), each
        with its own noise scale that grows with body size (the scatter widens as animals get bigger), then
        compare them by <b>BIC</b> — declaring dimorphism only when the two-curve model wins despite a penalty for its extra parameters.
        Because it pools every animal and never forces a label, it keeps working where classification can't, and its power grows with
        sample size: with enough specimens you can confirm a size difference far too small to sex anyone by. It is deliberately
        conservative (few false alarms when there's truly no difference), so a non-detection in a small sample means "insufficient
        evidence," not "no dimorphism." This is the model-selection gate the caveat below anticipated.
      </Section>

      <Section title="Beyond one trait — the “Can We Beat It?” tab (Routes 1 and 2)">
        Methods A–C all sit at the same ceiling because they read the <i>same</i> body-size axis, and the residual rule already extracts
        nearly all the sex information that axis contains (see <b>Bayes error</b> in the glossary). This tab asks what it would take to do
        better, with two additions:
        <div style={{ margin: "8px 0 0 4px" }}>
          <div style={{ marginBottom: 6 }}><b>Route 1 — anchor on known sexes.</b> A random subset of specimens (any age, either sex) is sexed
            independently, and those labels are fed to the EM method as fixed anchors that the iteration cannot flip. Because the markers that sex a fossil
            (eggs in the body cavity, medullary bone, a mammalian baculum) form only in breeding adults, <b>anchors can only be mature adults — never
            juveniles.</b> Result: overall accuracy barely rises (the adults you can anchor were already the easy, well-separated ones), and accuracy on the
            still-unknown specimens drifts <i>down</i> — each anchored adult leaves the unknown pool more concentrated in the small, young animals whose
            sizes overlap, exactly the cases anchoring can never reach.</div>
          <div><b>Route 2 — add a second measurement (head/skull width).</b> Head width scales tightly with body length (allometry), so on its own
            it is mostly a size proxy. The slider δ sets the <i>size-independent</i> head-shape dimorphism — how much broader a male's head is for a
            given body length. Four EM classifiers are compared: body length vs age, head width vs age, both together (age + length + head width), and
            relative head breadth (HW/L) ignoring age. At δ = 0 head width is redundant with size and relative breadth is at chance; as δ grows the
            head-shape signal lifts the breadth-based and head-width classifiers. The lesson: a genuinely size-independent trait is what breaks the
            ceiling, not more of the same measurement.</div>
        </div>
      </Section>

      <Section title="What we measure">
        <b>1. Sex-assignment accuracy</b> — the percentage of specimens placed in the group matching their true sex (scored per-sex,
        exactly as Saitta did). This is the direct test of which method sorts better. <b>2. Estimated effect size</b> — we refit a VB
        curve to each method's two groups and take the difference in their asymptotic lengths (L∞). Comparing that to the true E tells
        us whether better sorting actually buys a less biased size estimate (the downstream test, where the classification-EM pulls
        ahead). <b>3. Detection power</b> (Method D) — how often the two-curve model is preferred over one, swept against effect size and
        sample size, to show what's learnable when no individual can be sexed.
      </Section>

      <Section title="On effect-size estimates, and two honest caveats">
        The effect-size estimates are reported <i>unfiltered</i>: when a method mis-sorts the sample, the growth curve refitted to a lopsided
        group can diverge to an absurd asymptote (tens of metres), and that value is averaged in rather than thrown out. This is deliberate —
        those blow-ups are a real bias the method introduces, so hiding them would flatter the worst offenders. They are shown, not removed; the
        only runs with no number at all are the rare ones where a group was too small to fit a curve. Two further caveats: (i) the <i>GMM</i>
        clusters residuals from a single misspecified curve, not the raw age–length data — the classification-EM (Method C) is the full
        mixture-of-growth-curves model that addresses this, and it is the most reliable of the three; (ii) the per-animal comparison
        (Methods A–C) deliberately has <i>no</i> "declare no dimorphism" gate, so the assignment comparison stays clean and apples-to-apples —
        that model-selection gate lives separately as Method D (one-curve vs two-curve by BIC).
      </Section>
      <Section title="Formulae and definitions — full reference">
        Every quantity the simulator computes is defined here. <i>L</i> is a body length (or size) measurement; <i>t</i> is age; subscripts
        m and f denote male and female. All sizes are in metres unless noted.

        <Term><b>1. Growth curves.</b> A growth model predicts size L̂ at age t from three parameters: the asymptote L∞ (adult/maximum size),
        the rate constant K (how fast L∞ is approached), and a timing offset t₀.</Term>
        <Fml>von Bertalanffy:  L̂(t) = L∞ · (1 − exp(−K (t − t₀)))</Fml>
        <Fml>logistic:  L̂(t) = L∞ / (1 + exp(−K (t − t₀)))</Fml>
        <Fml>Gompertz:  L̂(t) = L∞ · exp(−exp(−K (t − t₀)))</Fml>

        <Term><b>2. Residual.</b> How far a specimen sits above (+) or below (−) the single curve fitted to everyone.</Term>
        <Fml>rᵢ = Lᵢ − L̂(tᵢ)</Fml>

        <Term><b>3. Noise model (simulated alligator scatter).</b> Residual spread grows with body size; the slider multiplies it (sdMult = 1 at "natural").</Term>
        <Fml>σ(L) = sdMult · (0.0589 · ln L + 0.0816)</Fml>

        <Term><b>4. Normal (Gaussian) density</b>, used by Methods B, C and D.</Term>
        <Fml>N(x; μ, σ) = (1 / (σ √(2π))) · exp(−(x − μ)² / (2σ²))</Fml>

        <Term><b>5. Effect size (degree of dimorphism).</b> The size gap between the sexes' asymptotes. The Detecting-Dimorphism tab reports it relative to the smaller group.</Term>
        <Fml>E = L∞,m − L∞,f      E% = (L∞,large − L∞,small) / L∞,small × 100%</Fml>

        <Term><b>6. Method A — residual split (Saitta).</b> Label by the sign of the residual.</Term>
        <Fml>assign “male” if rᵢ &gt; 0,  else “female”</Fml>

        <Term><b>7. Method B — Gaussian mixture (GMM) on residuals.</b> Fit a two-component mixture to the residuals by EM (μ₂ &gt; μ₁), then label by the posterior probability of belonging to the upper component.</Term>
        <Fml>f(r) = π · N(r; μ₂, σ₂) + (1 − π) · N(r; μ₁, σ₁)</Fml>
        <Fml>P₂(r) = π · N(r; μ₂, σ₂) / f(r)      assign “male” if P₂(rᵢ) &gt; 0.5</Fml>
        <Fml note="π is the mixing weight (the estimated fraction in the upper component).">&nbsp;</Fml>

        <Term><b>8. Method C — seeded classification-EM.</b> Seed with Method A, then iterate: score each animal against each sex's current growth curve g by its Gaussian log-likelihood at that animal's age, assign it to the better-fitting curve, refit both curves, repeat to convergence; finally label the larger-L∞ curve "male".</Term>
        <Fml>ℓ_g(i) = − ln σ(L̂_g(tᵢ)) − ½ · ( (Lᵢ − L̂_g(tᵢ)) / σ(L̂_g(tᵢ)) )²</Fml>
        <Fml>assign i to the sex g with the larger ℓ_g(i)</Fml>

        <Term><b>9. Accuracy metrics.</b> Per-sex accuracy is the fraction of each true sex placed in the matching group; balanced accuracy averages them (so an uneven sex ratio cannot inflate it); overall accuracy is the raw fraction correct out of N total.</Term>
        <Fml>A_m = (true males labelled male) / (n_males)      A_f = (true females labelled female) / (n_females)</Fml>
        <Fml>A_balanced = (A_m + A_f) / 2      A_overall = (total correct) / N</Fml>
        <Fml note="At a 0% or 100% ratio only one sex exists, so A_balanced reduces to that sex's accuracy.">&nbsp;</Fml>

        <Term><b>10. Second trait — head/skull width (Route 2).</b> Head width scales with body length (allometry); males are δ broader for a given length (a size-independent shape difference); ε is standard-normal noise. The sexing feature is the size-free ratio R.</Term>
        <Fml>HW = HEAD_RATIO · L · (1 + δ · [male]) · (1 + HEAD_CV · ε),   ε ~ N(0, 1)</Fml>
        <Fml>relative head breadth:  R = HW / L</Fml>
        <Fml note="HEAD_RATIO = 0.09 (female head width ÷ body length); HEAD_CV = 0.06; δ = size-independent head-shape dimorphism. At δ = 0, R carries no sexual signal.">&nbsp;</Fml>

        <Term><b>11. Pearson correlation</b> (used to report how strongly head width tracks body size).</Term>
        <Fml>r = Σ(xᵢ − x̄)(yᵢ − ȳ) / √( Σ(xᵢ − x̄)² · Σ(yᵢ − ȳ)² )</Fml>

        <Term><b>12. Detection (Method D) — model selection by BIC.</b> Compare a one-curve model (k₁ = 4 parameters: L∞, K, t₀, σ) against a 50:50 two-curve mixture (k₂ = 7). For a model with maximized likelihood L̂, k parameters and n specimens:</Term>
        <Fml>BIC = −2 · ln L̂ + k · ln n</Fml>
        <Fml>ΔBIC = BIC₁ − BIC₂ = 2 (ln L̂₂ − ln L̂₁) − 3 · ln n      choose two curves if ΔBIC &gt; 0</Fml>

        <Term><b>13. Bootstrap p-value</b> (null calibration). Simulate B datasets under the fitted one-curve model; b of them reach a ΔBIC at least as large as observed. The +1/+1 (add-one) form prevents an unsupported zero.</Term>
        <Fml>p = (b + 1) / (B + 1)</Fml>

        <Term><b>14. Statistical power.</b> For a true effect size E, simulate two-group datasets (asymptotes differing by E) at the sample's ages and within-group σ; power is the fraction in which BIC selects two curves. At E = 0 this equals the false-positive rate.</Term>
        <Fml>power(E) = (datasets with ΔBIC &gt; 0) / (datasets simulated)</Fml>

        <Term><b>15. Route 1 — anchored EM, and Route 2 classifiers.</b> Route 1 is the EM method with a random subset of specimens given their true sex as fixed anchors: seed by residual sign, overwrite the anchors with their true labels, then iterate the fit/relabel steps while never moving the anchors (which also fix the male/female orientation). Route 2 runs the same EM on different measurements — body length vs age, head width vs age, or both at once (likelihoods summed across measurements, each standardized by its own residual scatter) — plus a one-dimensional two-class EM on the size-free ratio R = HW/L with age ignored.</Term>
      </Section>
    </div>
  );
}
// ============================================================================
//  Single-run inspector ("Why?") — shows the mechanism on one dataset
// ============================================================================
function MechanismPanel({ nPerSex, gSeed = 1, maleFrac = 0.5 }) {
  const [dimMult, setDimMult] = useState(1.0);
  const [seed, setSeed] = useState(0);
  const [sample, setSample] = useState(null);
  const [emFrames, setEmFrames] = useState([]);
  const [emIdx, setEmIdx] = useState(0);

  useEffect(() => {
    seedRNG(gSeed * 100003 + seed * 17 + 1);
    let res = null;
    for (let tries = 0; tries < 8 && !res; tries++) res = simBoth(nPerSex, NATURAL_E * dimMult, 1.0, maleFrac);
    setSample(res);
    const frames = res ? fitCEMTrace(res.ages, res.lens, 1.0, res.aAssignMale) : [];
    setEmFrames(frames); setEmIdx(0);
  }, [dimMult, seed, nPerSex, gSeed, maleFrac]);

  if (!sample) {
    return <div style={{ textAlign: "center", padding: "60px 0", color: "#8a7a5a", fontStyle: "italic" }}>Generating a sample...</div>;
  }

  const { ages, lens, trueMale, resid, fit, gmm, aAssignMale, bAssignMale, cAssignMale, aScore, bScore, cScore, aEff, bEff, cEff } = sample;

  // Build sorted-by-age rows for the scatter+curve overlays.
  const order = ages.map((_, i) => i).sort((i, j) => ages[i] - ages[j]);
  const mkRows = (assignMale) => order.map(i => {
    const correct = assignMale[i] === trueMale[i];
    return {
      age: +ages[i].toFixed(2),
      length: +lens[i].toFixed(3),
      fitLength: +vbPredict(fit, ages[i]).toFixed(3),
      assignedMale: assignMale[i],
      trueMale: trueMale[i],
      errLength: correct ? null : +lens[i].toFixed(3),
    };
  });
  const trueRows = order.map(i => ({
    age: +ages[i].toFixed(2), length: +lens[i].toFixed(3),
    fitLength: +vbPredict(fit, ages[i]).toFixed(3), trueMale: trueMale[i],
  }));
  const aRows = mkRows(aAssignMale);
  const bRows = mkRows(bAssignMale);
  const cRows = cAssignMale ? mkRows(cAssignMale) : null;

  // ---- Residual density: the 1-D world the GMM actually clusters in --------
  const rMin = Math.min(...resid), rMax = Math.max(...resid);
  // Keep only cut(s) inside the actual data range. With unequal component
  // variances the posterior-0.5 equation is quadratic, and its second root sits
  // far out in the wider component's tail — beyond any real residual, so it
  // never changes an assignment and only clutters the plot.
  const bnds = gmmBoundaries(gmm).filter(b => b >= rMin && b <= rMax);
  const rPad = (rMax - rMin) * 0.10 || 0.1;
  const rLo = rMin - rPad, rHi = rMax + rPad;
  const NG = 100;
  const gpdf = (x, mu, sig) => sig <= 0 ? 0 : Math.exp(-0.5 * ((x - mu) / sig) ** 2) / (sig * Math.sqrt(2 * Math.PI));
  // The two weighted Gaussian components the GMM fitted, and their sum.
  const densRows = Array.from({ length: NG + 1 }, (_, k) => {
    const x = rLo + (rHi - rLo) * k / NG;
    const dLow = gmm.pi * gpdf(x, gmm.mu1, gmm.s1);        // lower-mean ("female") component
    const dHigh = (1 - gmm.pi) * gpdf(x, gmm.mu2, gmm.s2); // upper-mean ("male") component
    return { r: +x.toFixed(4), dLow: +dLow.toFixed(4), dHigh: +dHigh.toFixed(4), dTot: +(dLow + dHigh).toFixed(4) };
  });
  const maxDens = Math.max(...densRows.map(d => d.dTot), 1e-6);
  const yTop = maxDens * 1.12, yBot = -maxDens * 0.18;
  // Actual residuals drawn as a rug in the band below zero, colored by true sex.
  const rugRows = ages.map((_, i) => ({ r: +resid[i].toFixed(4), y: +(-maxDens * (0.03 + runifFixed(i) * 0.11)).toFixed(5), trueMale: trueMale[i] }));

  const lenDomain = [0, Math.max(...lens) * 1.08];
  const ageDomain = [0, 52];

  // A scatter sub-chart: points colored per-row by `colorOf`, optional error overlay + fit curve.
  const SplitChart = ({ rows, colorOf, title, acc, accColor, showFit }) => (
    <div style={{ background: C.panel, border: `1px solid ${C.line}`, padding: "12px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
        <div style={{ fontSize: 12, fontWeight: "bold", color: C.navy }}>{title}</div>
        <div style={{ fontSize: 12, fontWeight: "bold", color: accColor }}>{acc.toFixed(0)}% correct</div>
      </div>
      <ResponsiveContainer width="100%" height={240}>
        <ComposedChart data={rows} margin={{ top: 8, right: 14, left: 4, bottom: 28 }}>
          <CartesianGrid strokeDasharray="3 3" stroke="#ede8dd" />
          <XAxis dataKey="age" type="number" domain={ageDomain} tick={{ fontSize: 9 }}
            label={{ value: "Age (years)", position: "bottom", offset: -2, style: { fontSize: 10, fill: C.label } }} />
          <YAxis type="number" domain={lenDomain} tick={{ fontSize: 9 }} width={44}
            label={{ value: "Length (m)", angle: -90, position: "insideLeft", style: { fontSize: 10, fill: C.label, textAnchor: "middle" } }} />
          <Tooltip contentStyle={{ fontFamily: "Georgia,serif", fontSize: 10, border: `1px solid ${C.line}` }}
            formatter={(v, n) => n === "errLength" ? null : [v, n]} />
          {showFit && <Line dataKey="fitLength" stroke={C.navy} strokeWidth={2} dot={false} type="monotone" name="combined fit" isAnimationActive={false} legendType="none" />}
          <Scatter dataKey="length" isAnimationActive={false} legendType="none">
            {rows.map((row, i) => <Cell key={i} fill={colorOf(row)} />)}
          </Scatter>
          <Scatter dataKey="errLength" isAnimationActive={false} legendType="none" shape="circle" fill="none" stroke={C.err} strokeWidth={2} />
        </ComposedChart>
      </ResponsiveContainer>
    </div>
  );

  return (
    <div>
      <div style={{ display: "flex", gap: 24, alignItems: "center", flexWrap: "wrap", marginBottom: 16, background: C.soft, padding: "12px 18px", border: `1px solid ${C.line}` }}>
        <label style={{ fontSize: 13, display: "flex", alignItems: "center", gap: 10, flex: "1 1 320px" }}>
          <span style={{ color: C.label, fontWeight: "bold", whiteSpace: "nowrap" }}>True dimorphism</span>
          <input type="range" min={0} max={2.5} step={0.05} value={dimMult} onChange={e => setDimMult(+e.target.value)} style={{ flex: 1 }} />
          <span style={{ fontVariantNumeric: "tabular-nums", minWidth: 92, color: C.navy }}>{dimMult.toFixed(2)}× natural (E={(NATURAL_E * dimMult).toFixed(2)}m)</span>
        </label>
        <button onClick={() => setSeed(s => s + 1)} style={{ padding: "6px 16px", background: C.navy, color: "#e8dfc8", border: "none", cursor: "pointer", fontFamily: "inherit", fontSize: 12 }}>↻ New random sample</button>
      </div>

      <div style={{ fontSize: 13, lineHeight: 1.6, color: "#3a3228", marginBottom: 14 }}>
        One simulated dataset ({nPerSex}&nbsp;females + {nPerSex}&nbsp;males). Below, the <b>same points</b> are colored by their{" "}
        <b>true sex</b>, then by each method's assignment — <b>residual split</b>, <b>GMM</b>, and the new <b>classification-EM</b>.
        Red rings mark specimens a method got wrong. Drag the slider or draw a new sample to watch where the methods agree and disagree
        (notice the residual split and the EM almost always make the <i>same</i> calls).
      </div>

      <div style={{ marginBottom: 14 }}>
        <SplitChart rows={trueRows} showFit
          colorOf={row => row.trueMale ? C.male : C.female}
          title="Ground truth (color = true sex) + combined fit (navy)"
          acc={100} accColor="#888" />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 14, marginBottom: 8 }}>
        <SplitChart rows={aRows} showFit
          colorOf={row => row.assignedMale ? C.male : C.female}
          title="A — residual split"
          acc={aScore.overall} accColor={C.resid} />
        <SplitChart rows={bRows}
          colorOf={row => row.assignedMale ? C.male : C.female}
          title="B — GMM"
          acc={bScore.overall} accColor={C.gmm} />
        {cRows ? (
          <SplitChart rows={cRows} showFit
            colorOf={row => row.assignedMale ? C.male : C.female}
            title="C — classification-EM"
            acc={cScore.overall} accColor={C.cem} />
        ) : (
          <div style={{ background: C.panel, border: `1px solid ${C.line}`, padding: 12, display: "flex", alignItems: "center", justifyContent: "center", color: "#aaa", fontStyle: "italic", fontSize: 11, minHeight: 240 }}>
            classification-EM: a group collapsed for this draw (rare) — try a new sample
          </div>
        )}
      </div>

      <div style={{ display: "flex", gap: 22, flexWrap: "wrap", padding: "0 4px 14px", fontSize: 11, color: C.label, alignItems: "center" }}>
        <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}><span style={{ width: 11, height: 11, borderRadius: "50%", background: C.female, display: "inline-block" }} /> smaller / female group</span>
        <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}><span style={{ width: 11, height: 11, borderRadius: "50%", background: C.male, display: "inline-block" }} /> larger / male group</span>
        <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}><span style={{ width: 11, height: 11, borderRadius: "50%", border: `2px solid ${C.err}`, display: "inline-block" }} /> misassigned by this method</span>
        <Swatch color={C.navy}>combined VB fit (the residual-split boundary)</Swatch>
      </div>

      {/* Residual strip — the 1-D world the GMM actually clusters in */}
      <div style={{ background: C.panel, border: `1px solid ${C.line}`, padding: "14px 16px", marginBottom: 8 }}>
        <div style={{ fontSize: 12, fontWeight: "bold", color: C.navy, marginBottom: 2 }}>The residuals — what the GMM actually sees (age information discarded)</div>
        <div style={{ fontSize: 10, color: "#8a7a5a", fontStyle: "italic", marginBottom: 6 }}>
          The two shaded bumps are the Gaussian components the GMM fitted to the residuals (its model); the violet line is their sum —
          the overall mixture density. The dots along the bottom are the actual specimens (a rug plot), colored by <i>true</i> sex. The
          residual rule cuts at 0 (navy); the GMM cuts where its two components cross (violet dashed). Notice the true colors overlap far
          more than the tidy bumps imply — and that age, which the residual rule and the EM both use, is invisible on this axis.
        </div>
        <ResponsiveContainer width="100%" height={210}>
          <ComposedChart margin={{ top: 8, right: 16, left: 4, bottom: 28 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#ede8dd" />
            <XAxis dataKey="r" type="number" domain={[+rLo.toFixed(3), +rHi.toFixed(3)]} allowDataOverflow tick={{ fontSize: 9 }}
              label={{ value: "Residual from combined fit (m)", position: "bottom", offset: -2, style: { fontSize: 10, fill: C.label } }} />
            <YAxis type="number" domain={[yBot, yTop]} hide />
            <ZAxis type="number" range={[26, 26]} />
            <Tooltip cursor={{ strokeDasharray: "3 3" }} contentStyle={{ fontFamily: "Georgia,serif", fontSize: 10, border: `1px solid ${C.line}` }}
              formatter={(v, n) => n === "mixture density" ? [(+v).toFixed(2), n] : null} />
            <ReferenceLine y={0} stroke="#d8cfbb" strokeWidth={1} />
            <Area data={densRows} dataKey="dLow" baseValue={0} type="monotone" stroke={C.female} fill={C.female} fillOpacity={0.16} strokeWidth={1.6} isAnimationActive={false} legendType="none" name="lower component" />
            <Area data={densRows} dataKey="dHigh" baseValue={0} type="monotone" stroke={C.male} fill={C.male} fillOpacity={0.16} strokeWidth={1.6} isAnimationActive={false} legendType="none" name="upper component" />
            <Line data={densRows} dataKey="dTot" type="monotone" stroke={C.gmm} strokeWidth={2.2} dot={false} isAnimationActive={false} legendType="none" name="mixture density" />
            <ReferenceLine x={0} stroke={C.navy} strokeWidth={1.6}
              label={{ value: "residual rule cut (0)", position: "insideTopLeft", fill: C.navy, fontSize: 9, fontWeight: "bold", stroke: C.cream, strokeWidth: 3, paintOrder: "stroke" }} />
            {bnds.map((b, i) => (
              <ReferenceLine key={i} x={+b.toFixed(4)} stroke={C.gmm} strokeWidth={1.6} strokeDasharray="5 3"
                label={{ value: "GMM cut", position: "insideTopRight", fill: C.gmm, fontSize: 9, fontWeight: "bold", stroke: C.cream, strokeWidth: 3, paintOrder: "stroke" }} />
            ))}
            <Scatter data={rugRows} dataKey="y" isAnimationActive={false} legendType="none">
              {rugRows.map((row, i) => <Cell key={i} fill={row.trueMale ? C.male : C.female} />)}
            </Scatter>
          </ComposedChart>
        </ResponsiveContainer>
        <div style={{ display: "flex", gap: 20, flexWrap: "wrap", paddingTop: 8, fontSize: 10.5, color: C.label, alignItems: "center" }}>
          <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}><span style={{ width: 14, height: 9, background: C.female, opacity: 0.5, display: "inline-block" }} /> GMM lower component</span>
          <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}><span style={{ width: 14, height: 9, background: C.male, opacity: 0.5, display: "inline-block" }} /> GMM upper component</span>
          <Swatch color={C.gmm}>mixture density (sum)</Swatch>
          <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}><span style={{ width: 11, height: 11, borderRadius: "50%", background: C.female, display: "inline-block" }} />/<span style={{ width: 11, height: 11, borderRadius: "50%", background: C.male, display: "inline-block" }} /> actual specimens by true sex (rug)</span>
        </div>
      </div>

      {emFrames.length > 0 && (() => {
        const f = emFrames[Math.min(emIdx, emFrames.length - 1)];
        const last = emFrames.length - 1;
        let pts = [], grid = [], acc = null, ok2 = false;
        if (f && f.lFit && f.sFit) {
          ok2 = true;
          const largeIsTrue = f.lFit.Linf >= f.sFit.Linf;
          const largeFit = largeIsTrue ? f.lFit : f.sFit, smallFit = largeIsTrue ? f.sFit : f.lFit;
          let correct = 0;
          pts = order.map(i => { const big = f.assign[i] === largeIsTrue; const good = big === trueMale[i]; if (good) correct++; return { age: +ages[i].toFixed(2), length: +lens[i].toFixed(3), big, good }; });
          acc = correct / ages.length * 100;
          const aMin = Math.min(...ages), aMax = Math.max(...ages);
          grid = Array.from({ length: 50 }, (_, k) => { const a = aMin + (aMax - aMin) * k / 49; return { age: +a.toFixed(2), big: +vbPredict(largeFit, a).toFixed(3), small: +vbPredict(smallFit, a).toFixed(3), comb: +vbPredict(fit, a).toFixed(3) }; });
        }
        const btn = { padding: "5px 11px", background: "none", border: `1px solid ${C.line}`, color: C.navy, cursor: "pointer", fontFamily: "inherit", fontSize: 12 };
        return (
          <div style={{ background: C.panel, border: `1px solid ${C.line}`, padding: "14px 16px", marginBottom: 8 }}>
            <div style={{ fontSize: 12, fontWeight: "bold", color: C.cem, marginBottom: 2 }}>Method C — watching the classification-EM iterate (age axis kept)</div>
            <div style={{ fontSize: 10, color: "#8a7a5a", fontStyle: "italic", marginBottom: 8, lineHeight: 1.5 }}>
              Unlike the 1-D residual view above, the EM works in the full age–size plane. It starts from Saitta's residual-sign split (iteration 0),
              then repeats: <b>(M-step)</b> fit a growth curve to each tentative group, <b>(E-step)</b> reassign every specimen to whichever curve is
              closer at its own age — until no labels change. Dots are colored by current assignment (<span style={{ color: C.male }}>orange = larger-asymptote group</span>,{" "}
              <span style={{ color: C.female }}>blue = smaller</span>); a red ring marks a specimen currently on the wrong side of its true sex.
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 8, flexWrap: "wrap" }}>
              <button style={{ ...btn, opacity: emIdx <= 0 ? 0.4 : 1 }} disabled={emIdx <= 0} onClick={() => setEmIdx(i => Math.max(0, i - 1))}>◀ Previous iteration</button>
              <button style={{ ...btn, background: emIdx >= last ? "none" : C.navy, color: emIdx >= last ? C.navy : C.cream, opacity: emIdx >= last ? 0.4 : 1 }} disabled={emIdx >= last} onClick={() => setEmIdx(i => Math.min(last, i + 1))}>Next iteration ▶</button>
              <span style={{ fontSize: 12, color: C.navy, fontVariantNumeric: "tabular-nums" }}>Iteration <b>{emIdx}</b> of {last}{emIdx === 0 ? " (seed = residual split)" : ""}{emIdx >= last ? " — converged" : ""}</span>
            </div>
            {ok2 ? (
              <ResponsiveContainer width="100%" height={260}>
                <ComposedChart margin={{ top: 8, right: 16, left: 4, bottom: 28 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#ede8dd" />
                  <XAxis dataKey="age" type="number" domain={["auto", "auto"]} tick={{ fontSize: 9 }} label={{ value: "Age", position: "bottom", offset: -2, style: { fontSize: 10, fill: C.label } }} />
                  <YAxis type="number" domain={["auto", "auto"]} tick={{ fontSize: 9 }} width={42} label={{ value: "Body length / size", angle: -90, position: "insideLeft", style: { fontSize: 10, fill: C.label, textAnchor: "middle" } }} />
                  <Tooltip contentStyle={{ fontFamily: "Georgia,serif", fontSize: 10, border: `1px solid ${C.line}` }} />
                  <Line data={grid} dataKey="comb" stroke={C.navy} strokeWidth={1.2} strokeDasharray="2 3" dot={false} isAnimationActive={false} name="combined (1-curve) fit" />
                  <Line data={grid} dataKey="big" stroke={C.male} strokeWidth={2.2} dot={false} isAnimationActive={false} name="larger-group curve" />
                  <Line data={grid} dataKey="small" stroke={C.female} strokeWidth={2.2} dot={false} isAnimationActive={false} name="smaller-group curve" />
                  <Scatter data={pts} dataKey="length" isAnimationActive={false}>
                    {pts.map((p, j) => <Cell key={j} fill={p.big ? C.male : C.female} stroke={p.good ? "none" : C.err} strokeWidth={p.good ? 0 : 2} />)}
                  </Scatter>
                </ComposedChart>
              </ResponsiveContainer>
            ) : (
              <div style={{ height: 120, display: "flex", alignItems: "center", justifyContent: "center", color: "#aaa", fontStyle: "italic", fontSize: 12 }}>A tentative group collapsed (fewer than 5 members) — draw a new sample.</div>
            )}
            <div style={{ fontSize: 11.5, color: "#3a3228", marginTop: 6, lineHeight: 1.5 }}>
              {f.converged
                ? <><b style={{ color: "#2a6d4f" }}>Converged.</b> No specimen changes group anymore — the two curves and the labels are stable. </>
                : <><b>Next E-step will move {f.changed} specimen{f.changed === 1 ? "" : "s"}</b> to the other curve, after which the curves are refit. </>}
              {acc != null && <>Agreement with true sex at this iteration: <b>{acc.toFixed(0)}%</b>.</>}
            </div>
          </div>
        );
      })()}

      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12, fontSize: 11.5, color: "#3a3228" }}>
        <div style={{ background: C.soft, borderLeft: `4px solid ${C.resid}`, padding: "10px 14px", lineHeight: 1.55 }}>
          <b style={{ color: C.resid }}>A · Residual split:</b> recovered {aScore.overall.toFixed(0)}% (♂ {aScore.maleAcc.toFixed(0)}%,
          ♀ {aScore.femAcc.toFixed(0)}%); size difference {aEff == null ? "no fit (group too small)" : aEff.toFixed(2) + " m"}{" "}
          (true {(NATURAL_E * dimMult).toFixed(2)} m).
        </div>
        <div style={{ background: C.soft, borderLeft: `4px solid ${C.gmm}`, padding: "10px 14px", lineHeight: 1.55 }}>
          <b style={{ color: C.gmm }}>B · GMM:</b> recovered {bScore.overall.toFixed(0)}% (♂ {bScore.maleAcc.toFixed(0)}%,
          ♀ {bScore.femAcc.toFixed(0)}%); size difference {bEff == null ? "no fit (group too small)" : bEff.toFixed(2) + " m"}{" "}
          (true {(NATURAL_E * dimMult).toFixed(2)} m).
        </div>
        <div style={{ background: C.soft, borderLeft: `4px solid ${C.cem}`, padding: "10px 14px", lineHeight: 1.55 }}>
          <b style={{ color: C.cem }}>C · Classification-EM:</b>{" "}
          {cScore ? <>recovered {cScore.overall.toFixed(0)}% (♂ {cScore.maleAcc.toFixed(0)}%, ♀ {cScore.femAcc.toFixed(0)}%); size difference {cEff == null ? "no fit (group too small)" : cEff.toFixed(2) + " m"} (true {(NATURAL_E * dimMult).toFixed(2)} m).</> : <>a group collapsed for this draw — try a new sample.</>}
        </div>
      </div>
    </div>
  );
}

// Deterministic per-index jitter in [0,1) so the residual strip is stable within a sample.
function runifFixed(i) {
  const x = Math.sin((i + 1) * 12.9898) * 43758.5453;
  return x - Math.floor(x);
}

</script>
