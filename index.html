<script type="text/plain" id="app-source">
const { useState, useCallback, useRef, useEffect } = React;
const { LineChart, Line, ComposedChart, ScatterChart, Scatter, Area, XAxis, YAxis, ZAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, ReferenceLine, ReferenceArea, Cell } = Recharts;



// ============================================================================
//  Sexing Method Comparison Simulator
//  Companion to the Saitta et al. 2020 method-evaluation simulator.
//  Question: when you split a monomorphic von Bertalanffy fit's residuals into
//  two sexes, does the crude RESIDUAL-SIGN rule (Saitta) or a 2-component
//  GAUSSIAN MIXTURE (GMM) recover sex more accurately -- and which gives a less
//  biased estimate of the true size difference between sexes?
// ============================================================================

// ---- Tick / formatting helpers (shared with the main simulator) ------------
function niceTicks(lo, hi, targetCount = 5) {
  if (!isFinite(lo) || !isFinite(hi) || lo === hi) return [lo];
  const anchoredLo = lo >= 0 ? 0 : lo;
  const anchoredHi = hi <= 0 ? 0 : hi;
  const range = anchoredHi - anchoredLo;
  const roughStep = range / (targetCount - 1);
  const mag = Math.pow(10, Math.floor(Math.log10(Math.abs(roughStep) || 1)));
  const normalized = roughStep / mag;
  const niceStep = normalized <= 1 ? 1 * mag
                 : normalized <= 2 ? 2 * mag
                 : normalized <= 2.5 ? 2.5 * mag
                 : normalized <= 5 ? 5 * mag
                 : 10 * mag;
  const start = Math.ceil(anchoredLo / niceStep) * niceStep;
  const end = Math.floor(anchoredHi / niceStep) * niceStep;
  const ticks = [];
  for (let t = start; t <= end + niceStep * 0.001; t += niceStep) ticks.push(+t.toPrecision(10));
  return ticks.length >= 2 ? ticks : [anchoredLo, anchoredHi];
}

// ---- VB fitting via Gauss-Newton NLS (verbatim from the main simulator) -----
function vbPredict(params, age) {
  const { Linf, K, t0 } = params;
  return Linf * (1 - Math.exp(-K * (age - t0)));
}
function solve3x3(A, b) {
  const d = A[0][0]*(A[1][1]*A[2][2]-A[1][2]*A[2][1])
          - A[0][1]*(A[1][0]*A[2][2]-A[1][2]*A[2][0])
          + A[0][2]*(A[1][0]*A[2][1]-A[1][1]*A[2][0]);
  if (Math.abs(d) < 1e-14) return null;
  const inv = [[0,0,0],[0,0,0],[0,0,0]];
  inv[0][0]=(A[1][1]*A[2][2]-A[1][2]*A[2][1])/d;
  inv[0][1]=(A[0][2]*A[2][1]-A[0][1]*A[2][2])/d;
  inv[0][2]=(A[0][1]*A[1][2]-A[0][2]*A[1][1])/d;
  inv[1][0]=(A[1][2]*A[2][0]-A[1][0]*A[2][2])/d;
  inv[1][1]=(A[0][0]*A[2][2]-A[0][2]*A[2][0])/d;
  inv[1][2]=(A[0][2]*A[1][0]-A[0][0]*A[1][2])/d;
  inv[2][0]=(A[1][0]*A[2][1]-A[1][1]*A[2][0])/d;
  inv[2][1]=(A[0][1]*A[2][0]-A[0][0]*A[2][1])/d;
  inv[2][2]=(A[0][0]*A[1][1]-A[0][1]*A[1][0])/d;
  return [inv[0][0]*b[0]+inv[0][1]*b[1]+inv[0][2]*b[2],
          inv[1][0]*b[0]+inv[1][1]*b[1]+inv[1][2]*b[2],
          inv[2][0]*b[0]+inv[2][1]*b[1]+inv[2][2]*b[2]];
}
function fitVB(ages, lengths, maxIter = 200, tol = 1e-8) {
  let Linf = Math.max(...lengths) * 1.1, K = 0.1, t0 = 0;
  const n = ages.length;
  for (let iter = 0; iter < maxIter; iter++) {
    const resids = ages.map((a, i) => lengths[i] - vbPredict({ Linf, K, t0 }, a));
    const J = ages.map((a) => {
      const e = Math.exp(-K * (a - t0));
      return [1 - e, Linf * (a - t0) * e, -Linf * K * e];
    });
    const JtJ = [[0,0,0],[0,0,0],[0,0,0]];
    const Jtr = [0, 0, 0];
    for (let i = 0; i < n; i++) {
      for (let r = 0; r < 3; r++) {
        Jtr[r] += J[i][r] * resids[i];
        for (let c = 0; c < 3; c++) JtJ[r][c] += J[i][r] * J[i][c];
      }
    }
    const delta = solve3x3(JtJ, Jtr);
    if (!delta) break;
    Linf += delta[0]; K += delta[1]; t0 += delta[2];
    if (Math.abs(delta[0]) + Math.abs(delta[1]) + Math.abs(delta[2]) < tol) break;
  }
  if (!isFinite(Linf) || !isFinite(K) || !isFinite(t0) || K <= 0 || Linf <= 0) return null;
  return { Linf, K, t0 };
}

// ---- RNG -------------------------------------------------------------------
// Seedable PRNG (mulberry32) so a given seed reproduces every simulation exactly.
// All randomness in the simulator flows through rng(); seedRNG(n) resets the
// stream (and the Gaussian spare) so identical (seed, parameters) -> identical output.
let _rngState = 1 >>> 0;
function rng() {
  _rngState = (_rngState + 0x6D2B79F5) >>> 0;
  let t = _rngState;
  t = Math.imul(t ^ (t >>> 15), 1 | t);
  t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
  return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}
let _spare = null;
function seedRNG(n) { _rngState = (n >>> 0) || 1; _spare = null; }
function randn(mean, sd) {
  if (_spare !== null) { const v = _spare; _spare = null; return mean + sd * v; }
  let u = 0, v = 0;
  while (u === 0) u = rng();
  while (v === 0) v = rng();
  const m = Math.sqrt(-2 * Math.log(u));
  _spare = m * Math.sin(2 * Math.PI * v);
  return mean + sd * m * Math.cos(2 * Math.PI * v);
}
function runif(min, max) { return min + rng() * (max - min); }


// ---- Alligator model (Saitta) ----------------------------------------------
function alligSD(L, sdMult = 1) { return sdMult * (0.0589 * Math.log(Math.max(L, 0.01)) + 0.0816); }
function maleVB(age, E) { return (2.78 + E) * (1 - (0.91 + 0.02970297 * E) * Math.exp((-0.0926 + 0.022871287 * E) * age)); }
function femaleVB(age) { return 2.78 * (1 - 0.91 * Math.exp(-0.0926 * age)); }

// ---- GMM: 2-component Gaussian mixture via EM, returning posteriors ---------
// Returns the per-point posterior G2[i] = P(point i belongs to the UPPER-mean
// component | data). A point is assigned to the larger ("male") group when
// G2 > 0.5. This is the hard assignment used for the accuracy comparison.
function fitGMM(residuals, maxIter = 100, tol = 1e-6) {
  const n = residuals.length;
  if (n < 10) return null;
  const sorted = [...residuals].sort((a, b) => a - b);
  const half = Math.floor(n / 2);
  let mu1 = sorted.slice(0, half).reduce((s, x) => s + x, 0) / half;
  let mu2 = sorted.slice(half).reduce((s, x) => s + x, 0) / (n - half);
  const om = residuals.reduce((s, x) => s + x, 0) / n;
  const ov = residuals.reduce((s, x) => s + (x - om) ** 2, 0) / n;
  const initSD = Math.sqrt(ov / 2) || 0.01;
  let pi = 0.5, s1 = initSD, s2 = initSD, prevLL = -Infinity;
  const gauss = (x, mu, sig) => sig <= 0 ? 0 : Math.exp(-0.5 * ((x - mu) / sig) ** 2) / (sig * Math.sqrt(2 * Math.PI));
  for (let iter = 0; iter < maxIter; iter++) {
    const r1 = residuals.map(x => pi * gauss(x, mu1, s1));
    const r2 = residuals.map(x => (1 - pi) * gauss(x, mu2, s2));
    const rt = r1.map((v, i) => v + r2[i] + 1e-300);
    const g1 = r1.map((v, i) => v / rt[i]), g2 = r2.map((v, i) => v / rt[i]);
    const ll = rt.reduce((s, v) => s + Math.log(v), 0);
    if (!isFinite(ll)) return null;
    const n1 = g1.reduce((s, v) => s + v, 0), n2 = g2.reduce((s, v) => s + v, 0);
    if (n1 < 1 || n2 < 1) return null;
    pi = n1 / n;
    mu1 = g1.reduce((s, v, i) => s + v * residuals[i], 0) / n1;
    mu2 = g2.reduce((s, v, i) => s + v * residuals[i], 0) / n2;
    s1 = Math.sqrt(g1.reduce((s, v, i) => s + v * (residuals[i] - mu1) ** 2, 0) / n1) || 0.001;
    s2 = Math.sqrt(g2.reduce((s, v, i) => s + v * (residuals[i] - mu2) ** 2, 0) / n2) || 0.001;
    if (Math.abs(ll - prevLL) < tol) break;
    prevLL = ll;
  }
  // Order so component 2 is the UPPER-mean (larger / "male") component.
  if (mu1 > mu2) { [mu1, mu2] = [mu2, mu1]; [s1, s2] = [s2, s1]; pi = 1 - pi; }
  // Recompute posteriors with the final ordered parameters.
  const r1 = residuals.map(x => pi * gauss(x, mu1, s1));
  const r2 = residuals.map(x => (1 - pi) * gauss(x, mu2, s2));
  const G2 = r1.map((v, i) => r2[i] / (v + r2[i] + 1e-300));
  const pooledSD = Math.sqrt((s1 * s1 + s2 * s2) / 2);
  const sep = pooledSD > 0 ? (mu2 - mu1) / pooledSD : 0;
  return { mu1, mu2, s1, s2, pi, G2, sep };
}

// Analytic posterior-0.5 boundary points for two Gaussians (for the inspector).
function gmmBoundaries(g) {
  const { mu1, mu2, s1, s2, pi } = g;
  // Solve pi*N(x|mu1,s1) = (1-pi)*N(x|mu2,s2)  ->  A x^2 + B x + C = 0.
  const A = 1 / (2 * s1 * s1) - 1 / (2 * s2 * s2);
  const B = mu2 / (s2 * s2) - mu1 / (s1 * s1);
  const C = mu1 * mu1 / (2 * s1 * s1) - mu2 * mu2 / (2 * s2 * s2)
          - Math.log((pi / s1) / ((1 - pi) / s2));
  const roots = [];
  if (Math.abs(A) < 1e-12) {
    if (Math.abs(B) > 1e-12) roots.push(-C / B);
  } else {
    const disc = B * B - 4 * A * C;
    if (disc >= 0) {
      const sq = Math.sqrt(disc);
      roots.push((-B + sq) / (2 * A), (-B - sq) / (2 * A));
    }
  }
  // Keep only boundaries that fall between the two means (the meaningful split).
  return roots.filter(x => x > Math.min(mu1, mu2) - 3 && x < Math.max(mu1, mu2) + 3)
              .sort((a, b) => a - b);
}

// ---- Constants -------------------------------------------------------------
const NATURAL_E = 1.01;        // natural alligator dimorphism (Linf difference, m)
const NATURAL_SD_MULT = 1.0;   // natural residual scatter
const MATURE_AGE = 11;         // Route 1 only: age (yr) of sexual maturity. The markers
                               // that sex a fossil (eggs in the body cavity, medullary
                               // bone, a mammalian baculum) form only in breeding adults,
                               // so only specimens at or past this age can be anchored.
                               // ~11 yr ≈ the ~1.8 m size at which American alligators mature.
const N_STEPS = 20;
// ============================================================================
//  Simulation engine
// ============================================================================

// Effect estimate: refit a growth curve to each assigned group and return the gap
// in their asymptotes, |L∞,large − L∞,small|. NOTHING is filtered or capped — when a
// method mis-splits the data and the optimizer diverges to a huge asymptote, that
// inflated value is returned as-is, so the plotted estimate shows the method's true
// bias rather than hiding it. Returns null only when a group is too small to fit a
// 3-parameter curve at all, or the fit genuinely fails to converge (no number exists).
function effectOf(largeAges, largeLens, smallAges, smallLens) {
  if (largeAges.length < 3 || smallAges.length < 3) return null;
  const lFit = fitVB(largeAges, largeLens);
  const sFit = fitVB(smallAges, smallLens);
  if (!lFit || !sFit || !isFinite(lFit.Linf) || !isFinite(sFit.Linf)) return null;
  return Math.abs(lFit.Linf - sFit.Linf);
}

// ---- Method C: seeded classification-EM (a two-curve mixture) --------------
// Initialise with Saitta's residual-sign split, then alternate hard-EM steps:
// fit a VB curve to each tentative group, reassign every animal to the curve it
// is more likely to belong to under the age-dependent noise model, refit, and
// repeat until the labels stop changing. This is the principled version of what
// the GMM attempts -- but it keeps the AGE axis (each animal is compared to the
// two curves AT ITS OWN AGE) instead of collapsing to 1-D residual magnitudes,
// and the Saitta seed steers it away from the bad local optima that make a
// cold-start mixture fragile.
function fitCEM(ages, lens, sdMult, initAssignMale, maxIter = 30) {
  let assign = initAssignMale.slice();
  let lFit = null, sFit = null;
  for (let iter = 0; iter < maxIter; iter++) {
    const lA = [], lL = [], sA = [], sL = [];
    for (let i = 0; i < ages.length; i++) {
      if (assign[i]) { lA.push(ages[i]); lL.push(lens[i]); }
      else { sA.push(ages[i]); sL.push(lens[i]); }
    }
    if (lA.length < 5 || sA.length < 5) return null;
    const f1 = fitVB(lA, lL), f2 = fitVB(sA, sL);
    if (!f1 || !f2) return null;
    lFit = f1; sFit = f2;
    // Hard E-step: assign each animal to the higher-likelihood curve (equal
    // priors; Gaussian likelihood using the age-dependent SD at each curve).
    let changed = false;
    const next = new Array(ages.length);
    for (let i = 0; i < ages.length; i++) {
      const mPred = vbPredict(lFit, ages[i]), fPred = vbPredict(sFit, ages[i]);
      const mSD = Math.max(alligSD(mPred, sdMult), 1e-3);
      const fSD = Math.max(alligSD(fPred, sdMult), 1e-3);
      const llM = -Math.log(mSD) - 0.5 * ((lens[i] - mPred) / mSD) ** 2;
      const llF = -Math.log(fSD) - 0.5 * ((lens[i] - fPred) / fSD) ** 2;
      const m = llM >= llF;
      next[i] = m;
      if (m !== assign[i]) changed = true;
    }
    assign = next;
    if (!changed) break;
  }
  if (!lFit || !sFit) return null;
  // Keep the "male" label on the larger-asymptote curve, matching the scoring
  // convention (male == larger group, since true males have the bigger L-inf).
  if (lFit.Linf < sFit.Linf) { assign = assign.map(m => !m); const t = lFit; lFit = sFit; sFit = t; }
  return { assignMale: assign, lFit, sFit };
}

// Same algorithm as fitCEM, but records the full trajectory for visualization:
// one frame per iteration, each holding the assignment used to fit, the two
// fitted curves, how many points the E-step then moved, and whether converged.
function fitCEMTrace(ages, lens, sdMult, initAssignMale, maxIter = 30) {
  let assign = initAssignMale.slice();
  const frames = [];
  for (let iter = 0; iter < maxIter; iter++) {
    const lA = [], lL = [], sA = [], sL = [];
    for (let i = 0; i < ages.length; i++) { if (assign[i]) { lA.push(ages[i]); lL.push(lens[i]); } else { sA.push(ages[i]); sL.push(lens[i]); } }
    if (lA.length < 5 || sA.length < 5) { frames.push({ assign: assign.slice(), lFit: null, sFit: null, changed: 0, converged: true, collapsed: true }); break; }
    const lFit = fitVB(lA, lL), sFit = fitVB(sA, sL);
    if (!lFit || !sFit) { frames.push({ assign: assign.slice(), lFit: null, sFit: null, changed: 0, converged: true, collapsed: true }); break; }
    const next = new Array(ages.length); let changed = 0;
    for (let i = 0; i < ages.length; i++) {
      const mPred = vbPredict(lFit, ages[i]), fPred = vbPredict(sFit, ages[i]);
      const mSD = Math.max(alligSD(mPred, sdMult), 1e-3), fSD = Math.max(alligSD(fPred, sdMult), 1e-3);
      const llM = -Math.log(mSD) - 0.5 * ((lens[i] - mPred) / mSD) ** 2;
      const llF = -Math.log(fSD) - 0.5 * ((lens[i] - fPred) / fSD) ** 2;
      const m = llM >= llF; next[i] = m; if (m !== assign[i]) changed++;
    }
    frames.push({ assign: assign.slice(), lFit, sFit, changed, converged: changed === 0 });
    assign = next;
    if (changed === 0) break;
  }
  return frames;
}

// ===========================================================================
// BEYOND THE MONOMORPHIC FIT — two ways to add information the residual rule
// cannot use. (1) A semi-supervised EM that anchors on specimens whose sex is
// known independently. (2) EM classifiers that add a second measurement
// (head/skull width) alongside body length.
// ===========================================================================

// Semi-supervised classification-EM: identical to fitCEM, except specimens whose
// sex is known are pinned to their true label and never reassigned. Those anchors
// pull the two curves toward the real sex-specific curves, improving the unknowns.
function fitSemiCEM(ages, lens, sdMult, initAssignMale, knownMask, knownMale, maxIter = 30) {
  let assign = initAssignMale.slice();
  let knownCount = 0;
  for (let i = 0; i < assign.length; i++) if (knownMask[i]) { assign[i] = knownMale[i]; knownCount++; }
  let lFit = null, sFit = null;
  for (let iter = 0; iter < maxIter; iter++) {
    const lA = [], lL = [], sA = [], sL = [];
    for (let i = 0; i < ages.length; i++) { if (assign[i]) { lA.push(ages[i]); lL.push(lens[i]); } else { sA.push(ages[i]); sL.push(lens[i]); } }
    if (lA.length < 5 || sA.length < 5) return null;
    const f1 = fitVB(lA, lL), f2 = fitVB(sA, sL); if (!f1 || !f2) return null; lFit = f1; sFit = f2;
    let changed = false; const next = new Array(ages.length);
    for (let i = 0; i < ages.length; i++) {
      if (knownMask[i]) { next[i] = knownMale[i]; continue; }
      const mPred = vbPredict(lFit, ages[i]), fPred = vbPredict(sFit, ages[i]);
      const mSD = Math.max(alligSD(mPred, sdMult), 1e-3), fSD = Math.max(alligSD(fPred, sdMult), 1e-3);
      const llM = -Math.log(mSD) - 0.5 * ((lens[i] - mPred) / mSD) ** 2;
      const llF = -Math.log(fSD) - 0.5 * ((lens[i] - fPred) / fSD) ** 2;
      const m = llM >= llF; next[i] = m; if (m !== assign[i]) changed = true;
    }
    assign = next; if (!changed) break;
  }
  if (!lFit || !sFit) return null;
  // With no anchors, orientation is arbitrary -> label larger-Linf curve "male"
  // (as fitCEM does). With anchors, the known labels already fix orientation.
  if (knownCount === 0 && lFit.Linf < sFit.Linf) { assign = assign.map(m => !m); const t = lFit; lFit = sFit; sFit = t; }
  return { assignMale: assign, lFit, sFit };
}

// Accuracy of an assignment against truth, optionally restricted to a subset mask.
function accuracyOn(assignMale, trueMale, mask) {
  let c = 0, n = 0;
  for (let i = 0; i < trueMale.length; i++) { if (mask && !mask[i]) continue; n++; if (assignMale[i] === trueMale[i]) c++; }
  return n ? c / n * 100 : NaN;
}

// Biologically motivated second trait: HEAD (skull) WIDTH, which in alligators
// scales tightly with body length (allometry). We model head width as
//   HW = HEAD_RATIO * L * (1 + delta * isMale) * (1 + HEAD_CV * noise),
// i.e. females have head width ~ HEAD_RATIO of body length, males are "delta"
// fraction broader-headed FOR THE SAME body length (a size-INDEPENDENT shape
// dimorphism), with individual scatter HEAD_CV. The sexing-relevant feature is the
// proportion HW/L ("relative head breadth"), which removes the size dependence:
// its sexes differ only by delta, so at delta = 0 head width is a pure size proxy
// (perfectly redundant) and adds nothing beyond body size.
const HEAD_RATIO = 0.09;   // female head width as a fraction of body length
const HEAD_CV = 0.06;      // individual variation in relative head breadth
function pearson(a, b) {
  const n = a.length; let sa = 0, sb = 0; for (let i = 0; i < n; i++) { sa += a[i]; sb += b[i]; }
  const ma = sa / n, mb = sb / n; let cov = 0, va = 0, vb = 0;
  for (let i = 0; i < n; i++) { const da = a[i] - ma, db = b[i] - mb; cov += da * db; va += da * da; vb += db * db; }
  return va > 0 && vb > 0 ? cov / Math.sqrt(va * vb) : NaN;
}
function simBivar(nPerSex, E, sdMult, delta, maleFrac = 0.5) {
  const total = 2 * nPerSex;
  const nMale = Math.round(total * maleFrac);
  const nFemale = total - nMale;
  const ages = [], lens = [], headW = [], trueMale = [];
  for (let i = 0; i < nFemale; i++) { const a = runif(1, 50), L = randn(femaleVB(a), alligSD(femaleVB(a), sdMult)); const r = HEAD_RATIO * (1 + HEAD_CV * randn(0, 1)); ages.push(a); lens.push(L); headW.push(r * L); trueMale.push(false); }
  for (let i = 0; i < nMale; i++) { const a = runif(1, 50), L = randn(maleVB(a, E), alligSD(maleVB(a, E), sdMult)); const r = HEAD_RATIO * (1 + delta) * (1 + HEAD_CV * randn(0, 1)); ages.push(a); lens.push(L); headW.push(r * L); trueMale.push(true); }
  const fit = fitVB(ages, lens); if (!fit) return null;
  const resid = ages.map((a, i) => lens[i] - vbPredict(fit, a));
  const aAssignMale = resid.map(r => r > 0);
  return { ages, lens, headW, trueMale, fit, resid, aAssignMale };
}

// One-dimensional two-class EM on the trait alone (means + shared SD), labelling
// the higher-mean group "male". This is the "second trait, used by itself" method.
function fitTraitOnly(trait, maxIter = 40) {
  const n = trait.length, sorted = trait.slice().sort((a, b) => a - b);
  let m0 = sorted[Math.floor(n * 0.25)], m1 = sorted[Math.floor(n * 0.75)];
  let assign = trait.map(t => Math.abs(t - m1) <= Math.abs(t - m0));
  for (let it = 0; it < maxIter; it++) {
    let s0 = 0, n0 = 0, s1 = 0, n1 = 0;
    for (let i = 0; i < n; i++) { if (assign[i]) { s1 += trait[i]; n1++; } else { s0 += trait[i]; n0++; } }
    if (n0 < 2 || n1 < 2) break;
    m0 = s0 / n0; m1 = s1 / n1;
    let changed = false; for (let i = 0; i < n; i++) { const a = Math.abs(trait[i] - m1) <= Math.abs(trait[i] - m0); if (a !== assign[i]) changed = true; assign[i] = a; }
    if (!changed) break;
  }
  // Higher-mean group is "male".
  let s0 = 0, n0 = 0, s1 = 0, n1 = 0; for (let i = 0; i < n; i++) { if (assign[i]) { s1 += trait[i]; n1++; } else { s0 += trait[i]; n0++; } }

  if (mean1 < mean0) assign = assign.map(m => !m);

}

// Generic classification-EM over one or more measured variables, each modelled as
// its own growth curve against AGE. This is exactly the simulator's EM method,
// generalised so the variable need not be body length:
//   varArrays = [lens]            -> sex by body-length-vs-age          (Method 1)
//   varArrays = [headW]           -> sex by head-width-vs-age           (Method 2)
//   varArrays = [lens, headW]     -> sex by BOTH at once, age + length  (Method 3)
//                                    + head width: a 3-variable model.
// Seed exactly as fitCEM does (residual sign on the first variable). Each iteration:
// fit a growth curve to each group for every variable; estimate that variable's
// scatter from the pooled residuals (so variables on different scales combine
// fairly); reassign each animal to the sex whose curves jointly fit it better
// (summed Gaussian log-likelihood across variables). Larger first-variable L∞ = male.
function fitVarEM(ages, varArrays, initAssignMale, maxIter = 30) {
  const n = ages.length, V = varArrays.length;
  let assign = initAssignMale.slice();
  let fM = null, fF = null;
  for (let iter = 0; iter < maxIter; iter++) {
    const aM = [], aF = [];
    for (let i = 0; i < n; i++) (assign[i] ? aM : aF).push(i);
    if (aM.length < 5 || aF.length < 5) return null;
    fM = []; fF = []; const sd = [];
    for (let v = 0; v < V; v++) {
      const y = varArrays[v];
      const cM = fitVB(aM.map(i => ages[i]), aM.map(i => y[i]));
      const cF = fitVB(aF.map(i => ages[i]), aF.map(i => y[i]));
      if (!cM || !cF) return null;
      fM.push(cM); fF.push(cF);
      let sse = 0; for (let i = 0; i < n; i++) { const c = assign[i] ? cM : cF; const r = y[i] - vbPredict(c, ages[i]); sse += r * r; }
      sd.push(Math.max(Math.sqrt(sse / n), 1e-4));
    }
    let changed = false; const next = new Array(n);
    for (let i = 0; i < n; i++) {
      let llM = 0, llF = 0;
      for (let v = 0; v < V; v++) {
        const y = varArrays[v][i], s = sd[v];
        llM += -0.5 * ((y - vbPredict(fM[v], ages[i])) / s) ** 2;
        llF += -0.5 * ((y - vbPredict(fF[v], ages[i])) / s) ** 2;
      }
      const m = llM >= llF; next[i] = m; if (m !== assign[i]) changed = true;
    }
    assign = next; if (!changed) break;
  }
  if (!fM) return null;
  if (fM[0].Linf < fF[0].Linf) assign = assign.map(m => !m);
  let obj = 0; for (let v = 0; v < V; v++) { const y = varArrays[v]; let sse = 0; for (let i = 0; i < n; i++) { const c = assign[i] ? fM[v] : fF[v]; const r = y[i] - vbPredict(c, ages[i]); sse += r * r; } obj += Math.log(Math.max(sse / n, 1e-9)); }
  return { assignMale: assign, fM, fF, obj };
}

// Bivariate classification-EM over (age → body length, head width). ONE function
// serves both "both" methods, so they are guaranteed to differ in exactly one thing:
//   useCov = false → Method 3: force the residual covariance to be DIAGONAL (treat the
//                    two measurements as independent). Σ = diag(s11, s22).
//   useCov = true  → Method 4: keep the FULL 2×2 covariance Σ, including the off-diagonal
//                    s12 (model how the two residuals move together).
// Per iteration: fit a VB curve to each group for each measurement, estimate the pooled
// residual covariance (with s12 zeroed when diagonal), and assign every animal to the
// sex with the smaller squared Mahalanobis distance eᵀ Σ⁻¹ e. Larger body-length L∞ = male.
function fitBivarEM(ages, lens, headW, initAssignMale, useCov, maxIter = 30) {
  const n = ages.length;
  let assign = initAssignMale.slice();
  let cLM = null, cHM = null, cLF = null, cHF = null;
  const cov = () => {
    let s11 = 0, s22 = 0, s12 = 0;
    for (let i = 0; i < n; i++) {
      const cl = assign[i] ? cLM : cLF, ch = assign[i] ? cHM : cHF;
      const eL = lens[i] - vbPredict(cl, ages[i]), eH = headW[i] - vbPredict(ch, ages[i]);
      s11 += eL * eL; s22 += eH * eH; s12 += eL * eH;
    }
    s11 = s11 / n + 1e-6; s22 = s22 / n + 1e-6; s12 = useCov ? s12 / n : 0;
    return { s11, s22, s12 };
  };
  for (let iter = 0; iter < maxIter; iter++) {
    const iM = [], iF = [];
    for (let i = 0; i < n; i++) (assign[i] ? iM : iF).push(i);
    if (iM.length < 5 || iF.length < 5) return null;
    cLM = fitVB(iM.map(i => ages[i]), iM.map(i => lens[i]));
    cHM = fitVB(iM.map(i => ages[i]), iM.map(i => headW[i]));
    cLF = fitVB(iF.map(i => ages[i]), iF.map(i => lens[i]));
    cHF = fitVB(iF.map(i => ages[i]), iF.map(i => headW[i]));
    if (!cLM || !cHM || !cLF || !cHF) return null;
    const { s11, s22, s12 } = cov();
    const det = s11 * s22 - s12 * s12;
    if (!(det > 0)) return null;
    const i11 = s22 / det, i22 = s11 / det, i12 = -s12 / det;   // i12 = 0 when diagonal
    let changed = false; const next = new Array(n);
    for (let i = 0; i < n; i++) {
      const eLM = lens[i] - vbPredict(cLM, ages[i]), eHM = headW[i] - vbPredict(cHM, ages[i]);
      const eLF = lens[i] - vbPredict(cLF, ages[i]), eHF = headW[i] - vbPredict(cHF, ages[i]);
      const dM = i11 * eLM * eLM + 2 * i12 * eLM * eHM + i22 * eHM * eHM;
      const dF = i11 * eLF * eLF + 2 * i12 * eLF * eHF + i22 * eHF * eHF;
      const m = dM <= dF; next[i] = m; if (m !== assign[i]) changed = true;
    }
    assign = next; if (!changed) break;
  }
  if (!cLM) return null;
  if (cLM.Linf < cLF.Linf) assign = assign.map(m => !m);
  const { s11, s22, s12 } = cov();
  return { assignMale: assign, obj: Math.log(Math.max(s11 * s22 - s12 * s12, 1e-12)) };
}

// Pick the better-fitting result (lowest fit objective) among EM restarts; ignores nulls.
function bestFit(cands) { let b = null; for (const c of cands) if (c && (b === null || c.obj < b.obj)) b = c; return b; }

// Sweep A (Route 1): as the fraction of independently-sexed MATURE adults rises,
// track (i) OVERALL accuracy of the anchored EM (counts the known specimens, so it
// climbs as anchors are added), (ii) accuracy on only the still-UNKNOWN specimens
// (the ones actually inferred — does anchoring help the hard cases?), and (iii) the
// plain EM with no anchors as a flat baseline. Anchors can ONLY be sexually mature
// adults (age ≥ MATURE_AGE): the diagnostic markers form only in breeding adults, so
// juveniles — exactly where the sexes overlap most — can never be anchored.
function runKnownSweep(nPerSex, E, sdMult, fractions, nReps, maleFrac = 0.5, seed = 1) {
  seedRNG(seed);
  return fractions.map(fr => {
    let ov = 0, un = 0, em = 0, ns = 0, matFrac = 0;
    for (let r = 0; r < nReps; r++) {
      const s = simBoth(nPerSex, E, sdMult, maleFrac); if (!s) continue;
      const n = s.ages.length;
      const order = Array.from({ length: n }, (_, i) => i);
      for (let i = n - 1; i > 0; i--) { const j = Math.floor(rng() * (i + 1)); const t = order[i]; order[i] = order[j]; order[j] = t; }
      const maturePool = order.filter(i => s.ages[i] >= MATURE_AGE);   // shuffled, mature only
      const nKnown = Math.round(fr * maturePool.length);               // fr = fraction of MATURE adults sexed
      const knownMask = new Array(n).fill(false);
      for (let k = 0; k < nKnown; k++) knownMask[maturePool[k]] = true;
      const unknownMask = knownMask.map(x => !x);
      if (unknownMask.filter(Boolean).length < 2) continue;
      const semiRes = fitSemiCEM(s.ages, s.lens, sdMult, s.aAssignMale, knownMask, s.trueMale);
      const plainEM = fitCEM(s.ages, s.lens, sdMult, s.aAssignMale);
      if (!semiRes || !plainEM) continue;
      ov += accuracyOn(semiRes.assignMale, s.trueMale);
      un += accuracyOn(semiRes.assignMale, s.trueMale, unknownMask);
      em += accuracyOn(plainEM.assignMale, s.trueMale);
      matFrac += maturePool.length / n;
      ns++;
    }
    return { x: Math.round(fr * 100), overallAcc: ns ? ov / ns : NaN, unknownAcc: ns ? un / ns : NaN, emAcc: ns ? em / ns : NaN, matureShare: ns ? matFrac / ns * 100 : NaN };
  });
}

// Sweep B (Route 2): accuracy vs the size-independent head-shape dimorphism delta,
// for four EM classifiers — body length vs age, head width vs age, both together
// (age + length + head width), and relative head breadth (HW/L) ignoring age —
// with body-size dimorphism held at its natural value. Also returns the realized
// correlation between raw head width and body length (intrinsically high).
function runTraitSweep(nPerSex, E, sdMult, deltas, nReps, maleFrac = 0.5, seed = 1) {
  seedRNG(seed);
  return deltas.map(delta => {
    let sz = 0, hd = 0, bo = 0, bf = 0, rt = 0, corr = 0, ns = 0;
    for (let r = 0; r < nReps; r++) {
      const s = simBivar(nPerSex, E, sdMult, delta, maleFrac); if (!s) continue;
      const ratio = s.headW.map((h, i) => h / s.lens[i]);
      const szRes = fitVarEM(s.ages, [s.lens], s.aAssignMale);
      const hdRes = fitVarEM(s.ages, [s.headW], s.aAssignMale);
      if (!szRes || !hdRes) continue;
      const seedH = hdRes.assignMale;                       // head-width clustering
      const boRes = bestFit([fitBivarEM(s.ages, s.lens, s.headW, s.aAssignMale, false), fitBivarEM(s.ages, s.lens, s.headW, seedH, false)]);
      const bfRes = bestFit([fitBivarEM(s.ages, s.lens, s.headW, s.aAssignMale, true), fitBivarEM(s.ages, s.lens, s.headW, seedH, true)]);
      if (!boRes || !bfRes) continue;
      const rtAssign = fitTraitOnly(ratio);
      sz += accuracyOn(szRes.assignMale, s.trueMale);
      hd += accuracyOn(hdRes.assignMale, s.trueMale);
      bo += accuracyOn(boRes.assignMale, s.trueMale);
      bf += accuracyOn(bfRes.assignMale, s.trueMale);
      rt += accuracyOn(rtAssign, s.trueMale);
      corr += pearson(s.headW, s.lens);

    }
    return { x: Math.round(delta * 100), sizeAcc: ns ? sz / ns : NaN, headAcc: ns ? hd / ns : NaN, bothAcc: ns ? bo / ns : NaN, bothFullAcc: ns ? bf / ns : NaN, ratioAcc: ns ? rt / ns : NaN, corr: ns ? corr / ns : NaN };
  });
}

// ----------------------------------------------------------------------------
// ROUTE 3: a synthetic extra trait X with a tunable "size-independence" φ.
//   φ = 0 → X is a pure body-SIZE proxy: its only sex signal comes through size,
//           so it is redundant with body length (a long animal is also "big" in X).
//   φ = 1 → X is pure size-INDEPENDENT dimorphism: males sit at +gain, females at
//           −gain, with no dependence on how large the animal is.
// X is built from the STANDARDISED body length zL = (L − meanL)/sdL (which carries
// sex only through size) blended with a direct sex term, so φ slides X continuously
// from "redundant size proxy" to "independent sex signal":
//        X = (1−φ)·zL + φ·(±gain) + noise          (+ for males, − for females)
function simTrait(nPerSex, E, sdMult, phi, gain, maleFrac = 0.5) {
  const s = simBivar(nPerSex, E, sdMult, 0, maleFrac);
  if (!s) return null;
  const { ages, lens, trueMale, aAssignMale } = s;
  const n = lens.length;
  const meanL = lens.reduce((a, b) => a + b, 0) / n;
  const sdL = Math.sqrt(lens.reduce((a, b) => a + (b - meanL) * (b - meanL), 0) / n) || 1;
  const trait = lens.map((L, i) => (1 - phi) * ((L - meanL) / sdL) + phi * (trueMale[i] ? gain : -gain) + randn(0, 0.35));
  return { ages, lens, trait, trueMale, aAssignMale };
}

// Combine body-length-vs-age with the flat trait X. Length is modelled by a VB curve
// per sex; X by a per-sex mean (it has no age trend). Assign by squared Mahalanobis
// distance on the residual pair (L − L̂_g(t), X − X̄_g) under the pooled 2×2 covariance.
// useCov=false zeroes the off-diagonal (independent); true keeps it (proper).
function fitLenTraitEM(ages, lens, trait, initAssignMale, useCov, maxIter = 30) {
  const n = ages.length;
  let assign = initAssignMale.slice();
  let cM = null, cF = null, xM = 0, xF = 0;
  const cov = () => {
    let s11 = 0, s22 = 0, s12 = 0;
    for (let i = 0; i < n; i++) { const cl = assign[i] ? cM : cF, mx = assign[i] ? xM : xF; const rL = lens[i] - vbPredict(cl, ages[i]), rX = trait[i] - mx; s11 += rL * rL; s22 += rX * rX; s12 += rL * rX; }
    s11 = s11 / n + 1e-6; s22 = s22 / n + 1e-9; s12 = useCov ? s12 / n : 0;
    return { s11, s22, s12 };
  };
  for (let iter = 0; iter < maxIter; iter++) {
    const iM = [], iF = []; for (let i = 0; i < n; i++) (assign[i] ? iM : iF).push(i);
    if (iM.length < 5 || iF.length < 5) return null;
    cM = fitVB(iM.map(i => ages[i]), iM.map(i => lens[i]));
    cF = fitVB(iF.map(i => ages[i]), iF.map(i => lens[i]));
    if (!cM || !cF) return null;
    xM = iM.reduce((a, i) => a + trait[i], 0) / iM.length; xF = iF.reduce((a, i) => a + trait[i], 0) / iF.length;
    const { s11, s22, s12 } = cov(); const det = s11 * s22 - s12 * s12; if (!(det > 0)) return null;
    const i11 = s22 / det, i22 = s11 / det, i12 = -s12 / det;
    let changed = false; const next = new Array(n);
    for (let i = 0; i < n; i++) {
      const rLM = lens[i] - vbPredict(cM, ages[i]), rXM = trait[i] - xM;
      const rLF = lens[i] - vbPredict(cF, ages[i]), rXF = trait[i] - xF;
      const dM = i11 * rLM * rLM + 2 * i12 * rLM * rXM + i22 * rXM * rXM;
      const dF = i11 * rLF * rLF + 2 * i12 * rLF * rXF + i22 * rXF * rXF;
      const m = dM <= dF; next[i] = m; if (m !== assign[i]) changed = true;
    }
    assign = next; if (!changed) break;
  }
  if (!cM) return null;
  if (cM.Linf < cF.Linf) assign = assign.map(m => !m);
  const { s11, s22, s12 } = cov();
  return { assignMale: assign, obj: Math.log(Math.max(s11 * s22 - s12 * s12, 1e-12)) };
}

// Sweep the size-independence φ from 0 → 1 at fixed dimorphism gain. Returns, per φ:
// body-length-vs-age accuracy (the flat ceiling), trait-alone accuracy, and the
// length+trait full-covariance combination.
function runRoute3Sweep(nPerSex, E, sdMult, gain, phis, nReps, maleFrac = 0.5, seed = 1) {
  seedRNG(seed);
  return phis.map(phi => {
    let ln = 0, tr = 0, bo = 0, ns = 0;
    for (let r = 0; r < nReps; r++) {
      const s = simTrait(nPerSex, E, sdMult, phi, gain, maleFrac); if (!s) continue;
      const la = fitVarEM(s.ages, [s.lens], s.aAssignMale);
      const ta = fitTraitOnly(s.trait);
      const bf = bestFit([fitLenTraitEM(s.ages, s.lens, s.trait, s.aAssignMale, true), fitLenTraitEM(s.ages, s.lens, s.trait, ta, true)]);
      if (!la || !ta || !bf) continue;
      ln += accuracyOn(la.assignMale, s.trueMale);
      tr += accuracyOn(ta, s.trueMale);
      bo += accuracyOn(bf.assignMale, s.trueMale);
      ns++;
    }
    return { x: Math.round(phi * 100), lenAcc: ns ? ln / ns : NaN, traitAcc: ns ? tr / ns : NaN, bothAcc: ns ? bo / ns : NaN };
  });
}

// ===========================================================================
// Method D: DETECTION, not classification. Instead of labelling individuals,
// ask the population-level question -- "is there dimorphism at all?" -- by
// comparing a ONE-curve model against a TWO-curve mixture model and letting BIC
// adjudicate. This keeps power exactly where per-animal classification dies: a
// small mean shift between two heavily-overlapping sexes is detectable in
// aggregate (with enough animals) long before any single animal is assignable.
// ===========================================================================

// ===========================================================================
// "Your dataset" detection: a one-curve-vs-two-curve test for ARBITRARY
// (age, size) data, with a choice of growth model (von Bertalanffy / logistic /
// Gompertz) so it suits both reptiles and the sigmoidal growth of dinosaurs.
// Curves are fit by a damped (Levenberg-Marquardt) least-squares routine that is
// far more robust on real, lumpy fossil samples than plain Gauss-Newton. Each
// model fits its own constant Gaussian scatter, so nothing is imposed.
// ===========================================================================
function medianOf(arr) { const a = arr.slice().sort((x, y) => x - y); const m = Math.floor(a.length / 2); return a.length % 2 ? a[m] : (a[m - 1] + a[m]) / 2; }
const GROWTH = {

    init: (a, l) => ({ Linf: Math.max(...l) * 1.05, K: 0.2, t0: 0 }),
  },
  logistic: {
    label: "Logistic (S-shaped)",
    predict: (p, t) => p.Linf / (1 + Math.exp(-p.K * (t - p.t0))),
    jac: (p, t) => { const E = Math.exp(-p.K * (t - p.t0)), d = 1 + E; return [1 / d, p.Linf * (t - p.t0) * E / (d * d), -p.Linf * p.K * E / (d * d)]; },

  },
  gompertz: {
    label: "Gompertz (S-shaped)",
    predict: (p, t) => p.Linf * Math.exp(-Math.exp(-p.K * (t - p.t0))),
    jac: (p, t) => { const E = Math.exp(-p.K * (t - p.t0)), eE = Math.exp(-E); return [eE, p.Linf * eE * (t - p.t0) * E, -p.Linf * p.K * E * eE]; },
    init: (a, l) => ({ Linf: Math.max(...l) * 1.05, K: 0.3, t0: medianOf(a) }),
  },

// Damped least-squares fit of a 3-parameter growth model. Optional weights w and

function lmFit(ages, lens, model, w, p0, maxIter = 45) {

function fitOneCurveG(ages, lens, mk) {

// 5-fold cross-validated log-likelihood advantage of the two-curve model over one.
// For each fold: fit on the training rows, form the residual sign-split on TRAINING
// only (no leakage), fit a curve to each training subgroup, then score every held-out
// point by the two-curve MIXTURE density π·N(r_up) + (1−π)·N(r_lo) — NOT the nearer
// curve. Scoring by the nearer curve would let each test point peek at which group it
// fits best, inflating the advantage even with no real dimorphism; the mixture rule
// gives a properly behaved null (≈ 0 when there is no dimorphism, positive only when it
// is real). Returns the mean per-fold held-out (two-curve − one-curve) log-likelihood.

    const mono = lmFit(trA, trL, model); if (!mono) continue;

    // Form the two TRAINING groups with the chosen method (training-only — no leakage).

    const fL = lmFit(lo.map(i => ages[i]), lo.map(i => lens[i]), model);

// Normal quantile (Abramowitz & Stegun 26.2.17) + Cornish-Fisher t-quantile,
// matching the reference simulator so CI/PI widths agree.
function normQuantile(p) {
  const a = [2.515517, 0.802853, 0.010328], b = [1.432788, 0.189269, 0.001308];
  const t = Math.sqrt(-2 * Math.log(p <= 0.5 ? p : 1 - p));
  const x = t - (a[0] + a[1] * t + a[2] * t * t) / (1 + b[0] * t + b[1] * t * t + b[2] * t * t * t);

}

// Delta-method 95% confidence interval (for the MEAN curve) and prediction interval
// (for an INDIVIDUAL) of a fitted growth curve at targetAge. var(fit) = gradᵀ(JᵀJ)⁻¹grad·mse;
// the PI adds the residual variance mse. Generalised to any GROWTH model via its Jacobian.

// Assemble the full model-comparison report from the one- and two-curve fits.

function detectionMetrics(ages, lens, res, mk, method = "em") {
  const n = ages.length, k1 = res.one.k, k2 = res.two.k;        // 4 and 7
  const ll1 = res.one.ll, ll2 = res.two.ll, dLL = ll2 - ll1, dk = k2 - k1;

  const assign = groupAssign(ages, lens, mk, method, resid);   // true = upper (larger) group

// Generate one dataset and run ALL THREE sexing methods on the SAME data, so the
// comparison is perfectly fair. Returns rich per-point detail (used by both the
// sweep aggregation and the single-run inspector).
function simBoth(nPerSex, effectSize, sdMult, maleFrac = 0.5) {
  const total = 2 * nPerSex;
  const nMale = Math.round(total * maleFrac);
  const nFemale = total - nMale;
  const ages = [], lens = [], trueMale = [];
  for (let i = 0; i < nFemale; i++) {
    const a = runif(1, 50), L = femaleVB(a);
    ages.push(a); lens.push(randn(L, alligSD(L, sdMult))); trueMale.push(false);
  }
  for (let i = 0; i < nMale; i++) {
    const a = runif(1, 50), L = maleVB(a, effectSize);
    ages.push(a); lens.push(randn(L, alligSD(L, sdMult))); trueMale.push(true);
  }
  const fit = fitVB(ages, lens);
  if (!fit) return null;
  const resid = ages.map((a, i) => lens[i] - vbPredict(fit, a));

  // ---- Method A: residual sign (Saitta). r>0 -> larger ("male") group. ----
  const aAssignMale = resid.map(r => r > 0);
  // ---- Method B: GMM posterior. G2>0.5 -> upper-mean ("male") component. ---
  const gmm = fitGMM(resid);
  if (!gmm) return null;
  const bAssignMale = gmm.G2.map(g => g > 0.5);
  // ---- Method C: seeded classification-EM (two age-aware VB curves). -------
  const cem = fitCEM(ages, lens, sdMult, aAssignMale);
  const cAssignMale = cem ? cem.assignMale : null;

  // Per-sex accuracy, scored exactly as Saitta (fraction of each true sex put in
  // the matching group), so the metric is unaffected by an uneven sex ratio.
  // "male" group == larger group by construction (E>0).
  const score = (assignMale) => {
    let mc = 0, fc = 0;
    for (let i = 0; i < trueMale.length; i++) {
      if (trueMale[i] && assignMale[i]) mc++;
      if (!trueMale[i] && !assignMale[i]) fc++;
    }
    return { maleAcc: nMale ? mc / nMale * 100 : NaN, femAcc: nFemale ? fc / nFemale * 100 : NaN, overall: (mc + fc) / total * 100 };
  };
  const aScore = score(aAssignMale);
  const bScore = score(bAssignMale);
  const cScore = cAssignMale ? score(cAssignMale) : null;

  // Effect estimates from each method's groups (nothing filtered — see effectOf).
  const split = (assignMale) => {
    const lA = [], lL = [], sA = [], sL = [];
    assignMale.forEach((m, i) => { if (m) { lA.push(ages[i]); lL.push(lens[i]); } else { sA.push(ages[i]); sL.push(lens[i]); } });
    return effectOf(lA, lL, sA, sL);
  };
  const aEff = split(aAssignMale);
  const bEff = split(bAssignMale);
  const cEff = cAssignMale ? split(cAssignMale) : null;

  return {
    ages, lens, trueMale, resid, fit, gmm,
    aAssignMale, bAssignMale, cAssignMale,
    aScore, bScore, cScore,
    aEff, bEff, cEff,
    trueEffect: effectSize,
  };
}

// Aggregate many reps at each step of a sweep.
// scenario: "dimorphism" (E varies, SD fixed) or "noise" (SD varies, E fixed).
function runCompareSweep(scenario, steps, nPerSex, nReps, maleFrac = 0.5, seed = 1) {
  seedRNG(seed);
  const results = [];
  for (const step of steps) {
    const E = scenario === "dimorphism" ? step : NATURAL_E;
    const sd = scenario === "noise" ? step : NATURAL_SD_MULT;
    const rA = [], rB = [], rCc = [], eA = [], eB = [], eC = [], rAm = [], rAf = [], rBm = [], rBf = [], rCm = [], rCf = [];
    for (let r = 0; r < nReps; r++) {
      const res = simBoth(nPerSex, E, sd, maleFrac);
      if (!res) continue;
      rA.push(res.aScore.overall); rB.push(res.bScore.overall);
      rAm.push(res.aScore.maleAcc); rAf.push(res.aScore.femAcc);
      rBm.push(res.bScore.maleAcc); rBf.push(res.bScore.femAcc);
      if (isFinite(res.aEff)) eA.push(res.aEff);
      if (isFinite(res.bEff)) eB.push(res.bEff);
      if (res.cScore) {
        rCc.push(res.cScore.overall); rCm.push(res.cScore.maleAcc); rCf.push(res.cScore.femAcc);
        if (isFinite(res.cEff)) eC.push(res.cEff);
      }
    }
    if (rA.length === 0) { results.push(null); continue; }
    const mean = a => a.reduce((s, x) => s + x, 0) / a.length;
    const sdf = a => { const m = mean(a); return Math.sqrt(a.reduce((s, x) => s + (x - m) ** 2, 0) / a.length); };
    results.push({
      x: step, trueEffect: E,
      residAcc: mean(rA), residAccSd: sdf(rA),
      gmmAcc: mean(rB), gmmAccSd: sdf(rB),
      cemAcc: rCc.length ? mean(rCc) : NaN, cemAccSd: rCc.length ? sdf(rCc) : NaN,
      residMaleAcc: mean(rAm), residFemAcc: mean(rAf),
      gmmMaleAcc: mean(rBm), gmmFemAcc: mean(rBf),
      cemMaleAcc: rCm.length ? mean(rCm) : NaN, cemFemAcc: rCf.length ? mean(rCf) : NaN,
      residEff: eA.length ? mean(eA) : NaN,
      gmmEff: eB.length ? mean(eB) : NaN,
      cemEff: eC.length ? mean(eC) : NaN,
      n: rA.length,
    });
  }
  return results;
}

// Sweep the TRUE sex ratio (fraction male) at fixed natural dimorphism, scoring
// each method two ways: BALANCED per-sex accuracy (mean of male-accuracy and
// female-accuracy — true discriminative skill, unaffected by the ratio) and RAW
// overall accuracy (fraction correct — which rewards simply guessing the majority
// sex when the ratio is skewed).
// Mean of the per-sex accuracies that are defined. With both sexes present this is
// the usual (male+female)/2; at a 0%/100% ratio only one sex exists, so it reduces
// to that sex's accuracy (which collapses toward chance, since the methods still
// force a spurious two-group split on what is really a single population).
function avgDef(a, b) { const v = [a, b].filter(x => isFinite(x)); return v.length ? v.reduce((s, x) => s + x, 0) / v.length : NaN; }

function runRatioSweep(nPerSex, E, sdMult, fractions, nReps, seed = 1) {
  seedRNG(seed);
  return fractions.map(mf => {
    let aB = 0, bB = 0, cB = 0, aO = 0, bO = 0, cO = 0, ns = 0, nb = 0;
    for (let r = 0; r < nReps; r++) {
      const s = simBoth(nPerSex, E, sdMult, mf); if (!s || !s.cScore) continue;
      const ab = avgDef(s.aScore.maleAcc, s.aScore.femAcc), bb = avgDef(s.bScore.maleAcc, s.bScore.femAcc), cb = avgDef(s.cScore.maleAcc, s.cScore.femAcc);
      if (isFinite(ab) && isFinite(bb) && isFinite(cb)) { aB += ab; bB += bb; cB += cb; nb++; }
      aO += s.aScore.overall; bO += s.bScore.overall; cO += s.cScore.overall; ns++;
    }
    return {
      x: Math.round(mf * 100),
      residBal: nb ? aB / nb : NaN, gmmBal: nb ? bB / nb : NaN, cemBal: nb ? cB / nb : NaN,
      residOv: ns ? aO / ns : NaN, gmmOv: ns ? bO / ns : NaN, cemOv: ns ? cO / ns : NaN,
    };
  });
}

              tick={{ fontSize: 9 }} width={56} />
            <Tooltip
              formatter={(v, n) => [isFinite(v) ? (+v).toFixed(2) : "--", n]}
              labelFormatter={l => `${xLabel.split("(")[0].trim()}: ${(+l).toFixed(2)}`}
              contentStyle={{ fontFamily: "Georgia,serif", fontSize: "10px", border: `1px solid ${C.line}` }} />
            {refLines.map((r, i) => (
              <ReferenceLine key={i} y={r.y} stroke={r.color} strokeDasharray={r.dash || "4 4"} strokeWidth={1.2}
                label={{ value: r.label, position: r.pos || "insideTopRight", fill: r.color, fontSize: 9, fontWeight: "bold",
                  stroke: C.cream, strokeWidth: 3, paintOrder: "stroke" }} />
            ))}
            {series.map(s => (
              <Line key={s.key} type="monotone" dataKey={s.key} name={s.name}
                stroke={s.color} strokeWidth={s.width || 2.4} strokeDasharray={s.dash}
                dot={{ r: 2.5, fill: s.color }} activeDot={{ r: 5 }} connectNulls />
            ))}
            <Legend verticalAlign="top" height={24} iconType="plainline" wrapperStyle={{ fontSize: "11px" }} />
          </LineChart>
        </ResponsiveContainer>
      ) : (
        <div style={{ height: 250, display: "flex", alignItems: "center", justifyContent: "center", color: "#aaa", fontStyle: "italic", fontSize: 11 }}>No data</div>
      )}
    </div>
  );
}

// Small inline legend swatch
function Swatch({ color, dash, children }) {
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 11, color: C.label }}>

    </span>
  );
}

// ============================================================================
//  Accuracy panel (the headline result)
// ============================================================================
function AccuracyPanel({ results }) {
  const [metric, setMetric] = useState("overall");
  const { dimResults, noiseResults } = results;
  const bal = (d, p) => avgDef(d[p + "MaleAcc"], d[p + "FemAcc"]);
  const pack = (d, norm) => ({ x: +(d.x / norm).toFixed(3), residAcc: d.residAcc, gmmAcc: d.gmmAcc, cemAcc: d.cemAcc, residBal: bal(d, "resid"), gmmBal: bal(d, "gmm"), cemBal: bal(d, "cem") });
  const dim = dimResults.filter(Boolean).map(d => pack(d, NATURAL_E));
  const noi = noiseResults.filter(Boolean).map(d => pack(d, NATURAL_SD_MULT));

  // Headline: mean gap (residual minus GMM) across the swept range.
  const gap = (arr, a, b) => { const g = arr.filter(Boolean).filter(d => isFinite(d[a]) && isFinite(d[b])).map(d => d[a] - d[b]); return g.length ? g.reduce((s, x) => s + x, 0) / g.length : NaN; };
  const dimGap = gap(dimResults, "residAcc", "gmmAcc"), noiseGap = gap(noiseResults, "residAcc", "gmmAcc");
  const cemResidGap = gap(dimResults, "cemAcc", "residAcc");
  const atNat = dimResults.filter(Boolean).reduce((best, d) => Math.abs(d.x - NATURAL_E) < Math.abs(best.x - NATURAL_E) ? d : best, dimResults.filter(Boolean)[0]);

  const k = metric === "overall" ? { r: "residAcc", c: "cemAcc", g: "gmmAcc" } : { r: "residBal", c: "cemBal", g: "gmmBal" };
  const series = [
    { key: k.r, name: "Residual split (Saitta)", color: C.resid, width: 2.6 },
    { key: k.c, name: "Seeded classification-EM", color: C.cem, width: 2.6, dash: "1 0" },
    { key: k.g, name: "Gaussian mixture (GMM)", color: C.gmm, width: 2.6 },
  ];
  const refs = [{ y: 50, color: C.chance, label: "50% = chance", pos: "insideBottomRight" }];
  const metricBtn = id => ({ padding: "4px 12px", border: `1px solid ${metric === id ? C.navy : C.line}`, background: metric === id ? C.navy : "none", color: metric === id ? C.cream : C.navy, cursor: "pointer", fontFamily: "inherit", fontSize: 12 });

  return (
    <div>
      <div style={{ background: C.soft, borderLeft: `4px solid ${C.resid}`, padding: "14px 18px", marginBottom: "18px", fontSize: "13px", lineHeight: 1.65, color: "#3a3228" }}>
        <b style={{ color: C.navy }}>The headline:</b> adding a principled, age-aware method settles the question. The new{" "}
        <b style={{ color: C.cem }}>seeded classification-EM</b> — which fits two growth curves and assigns each animal to the curve it
        sits closer to <i>at its own age</i> — essentially <b>ties the crude residual rule</b> ({isFinite(cemResidGap) ? (cemResidGap >= 0 ? "+" : "") + cemResidGap.toFixed(1) : "--"} pts
        on average, i.e. no real difference), and <b>both beat the GMM at every level</b>. Near natural dimorphism the residual rule and
        the EM are correct about <b style={{ color: C.resid }}>{atNat ? atNat.residAcc.toFixed(0) : "--"}%</b> of the time vs about{" "}
        <b style={{ color: C.gmm }}>{atNat ? atNat.gmmAcc.toFixed(0) : "--"}%</b> for the GMM. Averaged across the dimorphism sweep the
        residual rule leads the GMM by <b>{isFinite(dimGap) ? dimGap.toFixed(1) : "--"}</b> points, and across noise by{" "}
        <b>{isFinite(noiseGap) ? noiseGap.toFixed(1) : "--"}</b>. The lesson: <b>the crude rule already sits at the accuracy ceiling</b> —
        a smarter classifier can match it but not beat it — and the GMM trails only because it discards the age axis (see <i>Why?</i>).
        The EM's real payoff is downstream, on the size-difference estimate (see <i>Effect</i>).
      </div>

      <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap", margin: "0 0 10px 2px", fontSize: 12 }}>
        <span style={{ color: C.label, fontWeight: "bold" }}>Accuracy metric:</span>
        <button style={metricBtn("overall")} onClick={() => setMetric("overall")}>Raw overall</button>
        <button style={metricBtn("balanced")} onClick={() => setMetric("balanced")}>Balanced per-sex</button>
        <span style={{ color: "#8a7a5a", fontStyle: "italic" }}>
          At a 50/50 sex ratio these are identical. Under a skewed ratio (set at the top) they diverge: <b>raw overall</b> = fraction of all
          specimens correct, which rewards simply guessing the majority sex; <b>balanced per-sex</b> = the mean of male-accuracy and
          female-accuracy, which measures true skill at telling the sexes apart.
        </span>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "18px" }}>
        <CompareChart
          title={metric === "overall" ? "Accuracy vs. true dimorphism (raw overall)" : "Accuracy vs. true dimorphism (balanced per-sex)"}
          subtitle="Size difference between sexes grows left→right (noise fixed at natural). Higher = better."
          data={dim} series={series} refLines={refs}
          xLabel={`True dimorphism (${NATURAL_LABEL})`} yLabel={metric === "overall" ? "% correctly sexed (overall)" : "balanced accuracy (%)"}
          yDomain={[40, 100]} yTicks={[40, 50, 60, 70, 80, 90, 100]} />
        <CompareChart
          title={metric === "overall" ? "Accuracy vs. measurement noise (raw overall)" : "Accuracy vs. measurement noise (balanced per-sex)"}
          subtitle="Residual scatter grows left→right (dimorphism fixed at natural). Higher = better."
          data={noi} series={series} refLines={refs}
          xLabel={`Noise (${NATURAL_LABEL})`} yLabel={metric === "overall" ? "% correctly sexed (overall)" : "balanced accuracy (%)"}
          yDomain={[40, 100]} yTicks={[40, 50, 60, 70, 80, 90, 100]} />
      </div>

      <div style={{ display: "flex", gap: 24, marginTop: 12, flexWrap: "wrap", padding: "0 4px" }}>
        <Swatch color={C.resid}>Residual split (Saitta)</Swatch>
        <Swatch color={C.cem}>Seeded classification-EM</Swatch>
        <Swatch color={C.gmm}>Gaussian mixture (GMM)</Swatch>
        <Swatch color={C.chance} dash>50% = pure chance (a coin flip)</Swatch>
      </div>

      <div style={{ marginTop: "20px", background: C.navy, color: "#e8dfc8", padding: "20px 26px" }}>
        <div style={{ fontSize: "11px", letterSpacing: "2px", textTransform: "uppercase", color: C.gold, marginBottom: "12px" }}>How to read these curves</div>
        <ul style={{ margin: 0, padding: "0 0 0 18px", lineHeight: 1.8, fontSize: "12px", color: "#ccc8bc" }}>
          <li><b>Residual vs EM (they overlap):</b> the bronze EM line sits almost exactly on the teal residual line. That is the point — once you use the age axis, a careful two-curve fit and a one-line "is the residual positive?" rule reach the <i>same</i> animals. The crude rule is not leaving accuracy on the table.</li>
          <li><b>Left (dimorphism):</b> at zero dimorphism all methods sit at 50% — none can invent sex information that isn't there. Accuracy climbs as the sexes separate, peaks near natural dimorphism, and <i>falls again at extreme dimorphism</i>: the combined curve fits each sex so poorly that young animals of both sexes get scrambled (curve-crossing in juveniles).</li>
          <li><b>Right (noise):</b> with the signal fixed, every method decays toward 50% as noise rises and drowns the size difference. The residual rule and the EM start higher (near-perfect at zero noise) and stay ahead of the GMM throughout.</li>
          <li><b>Why the GMM trails:</b> the residual rule and the EM both keep the age axis (the EM compares each animal to the two curves at its own age; the residual rule cuts at the combined curve, which sits between them). The GMM clusters one-dimensional residual <i>magnitudes</i> and ignores which age each came from, so it mislabels the young animals where the two curves nearly touch.</li>
        </ul>
      </div>
    </div>
  );
}

// ============================================================================
//  Effect-size estimation panel
// ============================================================================
function EffectPanel({ results }) {
  const { dimResults, noiseResults } = results;
  const dim = dimResults.filter(Boolean).map(d => ({ x: +(d.x / NATURAL_E).toFixed(3), trueEff: d.trueEffect, residEff: d.residEff, gmmEff: d.gmmEff, cemEff: d.cemEff }));
  const noi = noiseResults.filter(Boolean).map(d => ({ x: +(d.x / NATURAL_SD_MULT).toFixed(3), trueEff: d.trueEffect, residEff: d.residEff, gmmEff: d.gmmEff, cemEff: d.cemEff }));
  // Bias at the most extreme dimorphism point (estimate minus truth).
  const ext = dimResults.filter(Boolean).reduce((b, d) => d.x > b.x ? d : b, dimResults.filter(Boolean)[0]);
  const bias = (est) => (ext && isFinite(est) ? est - ext.trueEffect : NaN);
  const fmtBias = b => isFinite(b) ? (b >= 0 ? "+" : "") + b.toFixed(2) : "--";

  const series = [
    { key: "trueEff", name: "True difference", color: C.truth, width: 1.8, dash: "5 4" },
    { key: "residEff", name: "Residual split estimate", color: C.resid, width: 2.6 },
    { key: "cemEff", name: "Classification-EM estimate", color: C.cem, width: 2.6 },
    { key: "gmmEff", name: "GMM estimate", color: C.gmm, width: 2.6 },
  ];

  return (
    <div>
      <div style={{ background: C.soft, borderLeft: `4px solid ${C.cem}`, padding: "14px 18px", marginBottom: "18px", fontSize: "13px", lineHeight: 1.65, color: "#3a3228" }}>
        <b style={{ color: C.navy }}>Where the age-aware method pays off:</b> the three methods are tied on raw accuracy, but they diverge
        when you ask for the actual size difference (the gap in asymptotic length, L∞, between the sexes). At the most extreme dimorphism
        tested, the estimates miss the truth by <b style={{ color: C.gmm }}>{fmtBias(bias(ext && ext.gmmEff))} m</b> (GMM),{" "}
        <b style={{ color: C.resid }}>{fmtBias(bias(ext && ext.residEff))} m</b> (residual), and{" "}
        <b style={{ color: C.cem }}>{fmtBias(bias(ext && ext.cemEff))} m</b> (classification-EM). <b>Nothing is filtered or capped</b> — every
        run's estimate is averaged in. The GMM is consistently the most biased: clustering the residuals of a single misspecified curve, it
        mis-groups animals often enough that its asymptote gap drifts furthest from the truth. The residual split is mildly biased, and the
        seeded EM is closest of all, because both sort animals using age rather than residual shape alone. So if your scientific question is
        "how different are the sexes?", the seeded EM (or the plain residual rule) is the safer choice.
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "18px" }}>
        <CompareChart
          title="Estimated vs. true difference — dimorphism sweep"
          subtitle="Closer to the dashed truth line = less biased. Noise fixed at natural."
          data={dim} series={series}
          xLabel={`True dimorphism (${NATURAL_LABEL})`} yLabel="L∞ difference (m)" />
        <CompareChart
          title="Estimated vs. true difference — noise sweep"
          subtitle="Truth is flat at natural dimorphism; watch each method drift. Dimorphism fixed at natural."
          data={noi} series={series}
          xLabel={`Noise (${NATURAL_LABEL})`} yLabel="L∞ difference (m)" />
      </div>

      <div style={{ display: "flex", gap: 24, marginTop: 12, flexWrap: "wrap", padding: "0 4px" }}>
        <Swatch color={C.truth} dash>True difference</Swatch>
        <Swatch color={C.resid}>Residual split estimate</Swatch>
        <Swatch color={C.cem}>Classification-EM estimate</Swatch>
        <Swatch color={C.gmm}>GMM estimate</Swatch>
      </div>

      <div style={{ marginTop: "18px", background: C.navy, color: "#e8dfc8", padding: "18px 24px" }}>
        <div style={{ fontSize: "11px", letterSpacing: "2px", textTransform: "uppercase", color: C.gold, marginBottom: "10px" }}>Reading the estimates — nothing is hidden</div>
        <p style={{ margin: 0, fontSize: "12px", lineHeight: 1.8, color: "#ccc8bc" }}>
          Every run contributes its raw estimate, with no plausibility filter and no cap. If a method mis-sorts the sample so badly that a
          refitted curve diverges to an absurd asymptote, that inflated value is averaged in, not removed — so any spike you see is real. In
          practice the simulated ages span the whole growth range, so each subgroup usually still contains near-asymptotic animals and the fits
          stay bounded; an earlier version filtered out "implausible" asymptotes, but it almost never triggered, so dropping it leaves the curves
          essentially unchanged — which simply confirms nothing meaningful was being hidden. The GMM's larger bias is therefore not a handful of
          discarded outliers but a genuine, systematic effect of clustering residuals from one misspecified curve. The only runs absent from a
          point are the rare ones where a group came out too small to fit a curve at all — there is no number to plot, not a number being suppressed.
        </p>
      </div>
    </div>
  );
}

// ============================================================================
//  About panel

// ============================================================================

  const [data, setData] = useState(null);
  const [busy, setBusy] = useState(true);
